<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15150F">
<meta name="application-name" content="CRM MDS">
<meta name="description" content="CRM comercial de Grupo MDS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CRM MDS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<title>CRM MDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F5F1; --surface:#FFFFFF; --surface-2:#FAF9F6;
  --ink:#15150F; --ink-2:#5B5B52; --ink-3:#9C9B8F;
  --line:#E7E4DA; --line-soft:#F0EEE6;
  --accent:#1C6FB8; --accent-ink:#FFFFFF; --accent-soft:#EAF3FA;
  --amber:#FF9900; --amber-soft:#FFF3DF;
  --green:#1C6B41; --green-soft:#E9F5EE;
  --red:#B23A2C; --red-soft:#FBECE8;
  --radius-lg:16px; --radius-md:12px; --radius-sm:10px;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif; --mono:'DM Mono',ui-monospace,monospace;
  --shadow-card:0 1px 2px rgba(21,21,15,.04);
  --shadow-float:0 14px 40px rgba(21,21,15,.12);
  --shadow-sheet:0 -20px 60px rgba(21,21,15,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--ink);color:var(--ink);height:100dvh;overflow:hidden;display:flex;justify-content:center;padding:0;touch-action:manipulation}
@media(display-mode:standalone){body{user-select:none;-webkit-user-select:none}}
button,input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

.app{width:100%;max-width:430px;height:100dvh;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(21,21,15,.10)}
@media(max-width:600px){.app{max-width:none;box-shadow:none}}

.header{
  min-height:calc(62px + env(safe-area-inset-top));
  padding:env(safe-area-inset-top) 10px 0;
  display:grid;
  grid-template-columns:minmax(48px,1fr) auto minmax(118px,1fr);
  align-items:center;
  gap:8px;
  border-bottom:1px solid var(--line);
  background:var(--surface);
  position:relative;
  flex:0 0 auto;
}
.header-left{display:flex;align-items:center;justify-content:flex-start;min-width:0}
.header-center{display:flex;align-items:center;justify-content:center;min-width:0}
.header-actions{display:flex;align-items:center;justify-content:flex-end;gap:7px;min-width:0}
.header-title{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:2.4px;
  text-transform:uppercase;
  font-weight:500;
  color:var(--ink);
  white-space:nowrap;
}
.logo{
  position:static;
  display:block;
  width:auto;
  max-width:54px;
  height:34px;
  object-fit:contain;
}
.header-icon-btn{
  position:relative;
  width:36px;
  height:36px;
  flex:0 0 36px;
  border:1px solid var(--line);
  background:var(--surface-2);
  border-radius:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink-2);
}
.header-icon-btn svg{width:15px;height:15px}
.top-action{
  position:static;
  flex:0 0 auto;
  min-width:108px;
  height:40px;
  background:var(--amber);
  color:var(--ink);
  border:0;
  border-radius:12px;
  padding:0 14px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:1.1px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  white-space:nowrap;
}
.top-action svg{width:12px;height:12px}
.top-action:active,.header-icon-btn:active{transform:scale(.97)}

.content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:16px 16px calc(100px + env(safe-area-inset-bottom));background:var(--surface)}
.view{display:none;animation:fade .18s ease}
.view.active{display:block}
@keyframes fade{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:none}}

.nav{position:absolute;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:20px;display:flex;align-items:center;justify-content:space-around;box-shadow:var(--shadow-float);z-index:50}
.nav button{background:none;border:0;color:var(--ink-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:14px;flex:1;height:48px;transition:background .15s,color .15s}
.nav button svg{width:18px;height:18px}
.nav button span{font-family:var(--mono);font-size:7.5px;letter-spacing:.8px;text-transform:uppercase}
.nav button.active{background:var(--ink);color:#fff}

.section-title{font-family:var(--mono);font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px}
.list-count{font-family:var(--mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin:0 0 10px}

.hero{background:var(--ink);color:#fff;border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero:after{content:'';position:absolute;right:-30px;top:-38px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:10px}
.hero-num{font-family:var(--mono);font-size:34px;font-weight:500;line-height:1}
.hero-note{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);margin-top:6px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;background:var(--surface)}
.stat b{display:block;font-family:var(--mono);font-size:21px;font-weight:500;margin-bottom:4px}
.stat span{font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}

.disclosure{margin-bottom:10px}
.disclosure-head{width:100%;display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-md);padding:14px 14px;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-card)}
.disclosure-head span:first-child{flex:1;text-align:left}
.disclosure-count{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);background:var(--bg);border-radius:999px;padding:3px 9px}
.disclosure-head svg{width:15px;height:15px;color:var(--ink-3);transition:transform .18s ease;flex:0 0 auto}
.disclosure-head.open svg{transform:rotate(90deg)}
.disclosure .list{margin-top:8px}

.card{border:1px solid var(--line);border-radius:var(--radius-md);background:var(--surface);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.card.click{cursor:pointer;transition:transform .12s ease}
.card.click:active{transform:scale(.985)}
.card-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;margin-bottom:5px}
.card-title{font-size:15px;font-weight:700;line-height:1.2;margin-bottom:3px}
.card-sub{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);line-height:1.5}
.row{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.card-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
.card-side svg{width:14px;height:14px;color:var(--ink-3)}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-family:var(--mono);font-size:8px;color:var(--ink-2);background:var(--bg);display:inline-flex;align-items:center;gap:4px}
.chip svg{width:10px;height:10px}

.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;padding:4px 8px;border-radius:999px;white-space:nowrap}
.badge-pending{background:var(--amber-soft);color:var(--amber)}
.badge-done{background:var(--green-soft);color:var(--green)}
.badge-cancelled{background:var(--red-soft);color:var(--red)}
.imp-low{background:var(--bg);color:var(--ink-3);border:1px solid var(--line)}
.imp-mid{background:var(--accent-soft);color:var(--accent)}
.imp-high{background:var(--amber-soft);color:var(--amber)}
.imp-top{background:var(--red-soft);color:var(--red)}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex:0 0 auto}

.search-bar{position:relative;margin-bottom:12px}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-3)}
.search-bar input{padding-left:36px}
.field input,.field select,.field textarea,.search-bar input{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 12px;font-size:14px;background:var(--surface-2);color:var(--ink);font-family:var(--sans)}
.field textarea{min-height:86px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus,.search-bar input:focus{outline:none;border-color:var(--ink);background:#fff}
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:6px}

.filter-toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:9px 13px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:10px}
.filter-toggle svg{width:13px;height:13px}
.filter-active-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:var(--radius-sm);padding:11px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none}
.btn svg{width:14px;height:14px;flex:0 0 auto}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.blue{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.warn{background:var(--amber-soft);color:var(--amber);border-color:rgba(255,153,0,.28)}
.btn.danger{background:var(--red-soft);color:var(--red);border-color:rgba(178,58,44,.3)}
.btn.full{width:100%;margin-bottom:8px}
.btn:active{transform:scale(.985)}

.icon-btn{width:36px;height:36px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.icon-btn svg{width:15px;height:15px}

.list{display:flex;flex-direction:column;gap:10px}
.empty-state{border:1px dashed var(--line);border-radius:var(--radius-md);background:var(--bg);padding:38px 20px;text-align:center;color:var(--ink-3)}
.empty-state svg{width:26px;height:26px;margin-bottom:10px;color:var(--ink-3)}
.empty-title{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink-2);margin-bottom:4px}
.empty-sub{font-family:var(--mono);font-size:10px;line-height:1.6;max-width:240px;margin:0 auto}

.calendar-head{display:grid;grid-template-columns:36px 1fr 36px;gap:8px;align-items:center;margin-bottom:12px}
.calendar-title{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase}
.cal{border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden;background:var(--surface)}
.cal-week,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-week div{font-family:var(--mono);font-size:8px;color:var(--ink-3);text-align:center;padding:9px 0;background:var(--surface-2);text-transform:uppercase}
.day{min-height:58px;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:6px;position:relative;cursor:pointer}
.day:nth-child(7n){border-right:0}
.day-num{font-family:var(--mono);font-size:10px;color:var(--ink-2)}
.day.out .day-num{color:var(--line)}
.day.today{background:var(--accent-soft)}
.day.today .day-num{color:var(--accent);font-weight:500}
.points{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.point{width:7px;height:7px;border-radius:50%}

.sheet{position:fixed;inset:0;background:rgba(21,21,15,.42);display:none;align-items:flex-end;justify-content:center;z-index:100}
.sheet.show{display:flex}
.panel{width:100%;max-width:430px;max-height:calc(92dvh - env(safe-area-inset-top));background:var(--surface);border-radius:22px 22px 0 0;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-sheet)}
.panel-body{padding-bottom:calc(26px + env(safe-area-inset-bottom))!important}
.panel-head{padding:17px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.panel-title{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase}
.panel-sub{font-size:12px;color:var(--ink-2);margin-top:4px}
.panel-body{padding:16px 18px 26px;overflow:auto}
.close{border:1px solid var(--line);background:var(--surface-2);width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.close svg{width:14px;height:14px}

.confirm-overlay{position:fixed;inset:0;background:rgba(21,21,15,.46);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.confirm-overlay.show{display:flex}
.confirm-box{width:100%;max-width:336px;background:var(--surface);border-radius:var(--radius-lg);padding:20px;box-shadow:0 24px 60px rgba(21,21,15,.28)}
.confirm-title{display:flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:700;font-size:14.5px;margin-bottom:10px}
.confirm-title svg{width:18px;height:18px;color:var(--amber);flex:0 0 auto}
.confirm-body{font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:18px}

.toast{position:fixed;left:50%;bottom:92px;transform:translate(-50%,10px);background:var(--ink);color:#fff;font-family:var(--sans);font-size:12.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:0 14px 34px rgba(21,21,15,.3);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:300;max-width:84%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,0)}

.client-picker-list{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;margin-top:6px}
.pick-item{padding:11px;border-bottom:1px solid var(--line);cursor:pointer}
.pick-item:last-child{border-bottom:0}
.pick-item:active{background:var(--surface-2)}
.import-summary{font-family:var(--mono);font-size:10px;line-height:1.7;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;margin-top:8px;white-space:pre-wrap}
.settings-group{margin-bottom:20px}
.settings-group .btn{margin-bottom:8px}
.settings-card-title{display:flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:600;font-size:13px}
.settings-card-title svg{width:16px;height:16px;color:var(--ink-3)}

.info-grid{display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;font-size:12.5px}
.info-row span{font-family:var(--mono);font-size:9px;letter-spacing:.9px;text-transform:uppercase;color:var(--ink-3);flex:0 0 auto;padding-top:2px}
.info-row b{font-weight:600;text-align:right;color:var(--ink)}

.hidden{display:none!important}
.mono{font-family:var(--mono)}
.small{font-size:12.5px;color:var(--ink-2);line-height:1.55}
.danger-text{color:var(--red)}
.field-error{border-color:var(--red)!important;background:var(--red-soft)!important}
.conflict-choice{display:flex;gap:6px;margin-top:10px}
.conflict-opt{flex:1;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2);border-radius:var(--radius-sm);padding:9px 6px;font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer}
.conflict-opt.active{background:var(--ink);color:#fff;border-color:var(--ink)}


.auth-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom))}
.auth-screen.hidden{display:none!important}
.auth-card{width:100%;max-width:390px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow-float)}
.auth-brand{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.auth-title{font-size:24px;font-weight:700;line-height:1.15;margin-bottom:8px}
.auth-note{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:20px}
.auth-error{min-height:20px;color:var(--red);font-size:12px;margin:4px 0 8px}
.sync-pill{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);display:none}
.sync-pill.show{display:block}
.sync-pill.error{color:var(--red)}
.user-card{font-size:12px;color:var(--ink-2);word-break:break-word}
@media(max-width:370px){
  .content{padding-left:12px;padding-right:12px}
  .grid2,.actions{grid-template-columns:1fr}
  .nav{left:8px;right:8px}
  .nav button span{font-size:7px}
  .day{min-height:50px}
  .hero-num{font-size:29px}
}

.install-banner{position:fixed;z-index:900;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translate(-50%,18px);width:min(calc(100% - 24px),406px);background:var(--ink);color:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow-float);display:none;align-items:center;gap:12px;opacity:0;transition:.2s ease}
.install-banner.show{display:flex;opacity:1;transform:translate(-50%,0)}
.install-icon{width:42px;height:42px;border-radius:12px;flex:0 0 auto}
.install-copy{min-width:0;flex:1}
.install-copy b{display:block;font-size:13px;margin-bottom:2px}
.install-copy span{display:block;font-family:var(--mono);font-size:8.5px;line-height:1.45;color:rgba(255,255,255,.65)}
.install-actions{display:flex;gap:6px;align-items:center}
.install-actions button{border:0;border-radius:9px;padding:9px 10px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase}
.install-now{background:#fff;color:var(--ink)}
.install-close{background:rgba(255,255,255,.12);color:#fff;width:34px;padding:9px 0!important}
.offline-pill{position:fixed;left:50%;top:calc(8px + env(safe-area-inset-top));transform:translateX(-50%);z-index:1200;background:var(--amber-soft);color:var(--amber);border:1px solid rgba(255,153,0,.25);border-radius:999px;padding:6px 10px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;display:none}
.offline-pill.show{display:block}
@media(display-mode:standalone){.install-banner{display:none!important}}


.role-badge{display:inline-flex;border-radius:999px;padding:4px 8px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;background:var(--accent-soft);color:var(--accent)}
.role-badge.admin{background:var(--ink);color:#fff}
.assign-list{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff}
.assign-row{display:flex;align-items:flex-start;gap:10px;padding:11px;border-bottom:1px solid var(--line)}
.assign-row:last-child{border-bottom:0}
.assign-row input{margin-top:3px}
.assign-row-content{min-width:0;flex:1}
.assign-row-title{font-weight:600;font-size:13px}
.assign-row-sub{font-family:var(--mono);font-size:8.5px;color:var(--ink-3);margin-top:2px}
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th,.stats-table td{padding:9px 7px;border-bottom:1px solid var(--line);text-align:right}
.stats-table th:first-child,.stats-table td:first-child{text-align:left}
.stats-table th{font-family:var(--mono);font-size:8px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3)}


.status-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.status-action{border:1px solid var(--line);border-radius:10px;padding:10px 5px;background:var(--surface-2);font-family:var(--mono);font-size:8px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer}
.status-action.active.pending{background:var(--amber-soft);color:var(--amber);border-color:rgba(255,153,0,.28)}
.status-action.active.done{background:var(--green-soft);color:var(--green);border-color:rgba(28,107,65,.25)}
.status-action.active.cancelled{background:var(--red-soft);color:var(--red);border-color:rgba(178,58,44,.25)}
.metric-wide{grid-column:1/-1}
.progress-track{height:8px;border-radius:999px;background:var(--line-soft);overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--ink);border-radius:999px}
.commercial-stat-card{cursor:pointer}
.commercial-stat-card:active{transform:scale(.99)}
.stat-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}
.stat-mini{border:1px solid var(--line-soft);border-radius:10px;padding:9px;text-align:center;background:var(--surface-2)}
.stat-mini b{display:block;font-family:var(--mono);font-size:16px}
.stat-mini span{display:block;font-family:var(--mono);font-size:7px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
.notification-card{border-left:4px solid var(--accent)}


.stat-chevron{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;color:var(--ink-3);opacity:.72}
.stat-chevron svg{width:10px!important;height:10px!important}
.productivity-card{border:1px solid var(--line);border-radius:var(--radius-md);padding:16px;background:var(--surface);margin-bottom:10px}
.productivity-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.productivity-score{font-family:var(--mono);font-size:31px;font-weight:500;line-height:1}
.productivity-label{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-top:5px}
.productivity-ring{--value:0;width:72px;height:72px;border-radius:50%;background:conic-gradient(var(--ink) calc(var(--value)*1%),var(--line-soft) 0);display:grid;place-items:center;position:relative;flex:0 0 auto}
.productivity-ring:before{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--surface)}
.productivity-ring span{position:relative;z-index:1;font-family:var(--mono);font-size:12px;font-weight:500}
.chart-card{border:1px solid var(--line);border-radius:var(--radius-md);padding:15px;background:var(--surface);margin-bottom:10px}
.chart-title{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-bottom:13px}
.bar-row{display:grid;grid-template-columns:82px 1fr 34px;gap:9px;align-items:center;margin-bottom:10px}
.bar-label{font-family:var(--mono);font-size:8px;color:var(--ink-2)}
.bar-track{height:9px;border-radius:999px;background:var(--line-soft);overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:var(--ink);min-width:2px}
.bar-value{font-family:var(--mono);font-size:9px;text-align:right;color:var(--ink-2)}
.spark-bars{height:100px;display:flex;align-items:flex-end;gap:7px;padding-top:8px}
.spark-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%}
.spark-bar{width:100%;max-width:24px;min-height:3px;border-radius:5px 5px 2px 2px;background:var(--ink)}
.spark-label{font-family:var(--mono);font-size:7px;color:var(--ink-3);text-transform:uppercase}
.metric-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.metric-box{border:1px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center;background:var(--surface-2)}
.metric-box b{display:block;font-family:var(--mono);font-size:18px;font-weight:500}
.metric-box span{display:block;font-family:var(--mono);font-size:7px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);margin-top:4px}

.followup-cta{margin-top:10px}
.followup-note{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:6px}

.followup-company-note{font-family:var(--mono);font-size:8px;color:var(--ink-3);line-height:1.5;margin:-4px 0 10px}

/* v6: estados más visibles y asignaciones comerciales */
.card.activity-pending{border-color:rgba(255,153,0,.38);background:linear-gradient(180deg,#fff 0%,var(--amber-soft) 150%)}
.card.activity-done{border-color:rgba(28,107,65,.34);background:linear-gradient(180deg,#fff 0%,var(--green-soft) 150%)}
.card.activity-cancelled{border-color:rgba(178,58,44,.28);opacity:.82}
.status-ribbon{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;font-weight:500}
.status-ribbon:before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor}
.status-ribbon.pending{color:var(--amber)}
.status-ribbon.done{color:var(--green)}
.status-ribbon.cancelled{color:var(--red)}
.day.has-pending{box-shadow:inset 0 0 0 2px rgba(255,153,0,.22)}
.day.has-done{background:linear-gradient(180deg,var(--surface) 0%,var(--green-soft) 150%)}
.day.has-pending.has-done{background:linear-gradient(135deg,var(--amber-soft) 0%,var(--green-soft) 100%)}
.day-status{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.day-status-dot{width:7px;height:7px;border-radius:50%}
.day-status-dot.pending{background:var(--amber)}
.day-status-dot.done{background:var(--green)}
.day-status-dot.cancelled{background:var(--red)}
.assignment-chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 8px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:8px;margin-top:8px}
.assignment-chip.unassigned{background:var(--bg);color:var(--ink-3);border:1px solid var(--line)}
.assignment-chip svg{width:10px;height:10px}
.client-admin-meta{margin-top:8px}

/* v7: panel avanzado, mensajería y comisiones */
@media(max-width:370px){.top-action{padding-left:10px;padding-right:10px}}

.permissions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.permission-item{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface-2)}
.permission-item input{margin-top:3px}
.permission-item b{display:block;font-size:12px}
.permission-item span{display:block;font-family:var(--mono);font-size:7.5px;line-height:1.4;color:var(--ink-3);margin-top:3px}
.permission-note{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:8px}
@media(max-width:370px){.permissions-grid{grid-template-columns:1fr}}

/* v9: permisos de comisiones, PDFs y centro de notificaciones */
.commission-pdf{display:inline-flex;align-items:center;gap:6px;margin-top:10px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:var(--surface-2);font-family:var(--mono);font-size:8px;color:var(--accent);cursor:pointer}
.commission-pdf svg{width:12px;height:12px}
.file-selected{font-family:var(--mono);font-size:8px;color:var(--green);margin-top:7px;word-break:break-word}
.notification-center-list{display:flex;flex-direction:column;gap:8px}
.notification-center-item{border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface)}
.notification-center-item.attention{background:var(--amber-soft);border-color:rgba(255,153,0,.24)}
.notification-center-item.positive{background:var(--green-soft);border-color:rgba(28,107,65,.20)}
.notification-center-title{font-size:12.5px;font-weight:700}
.notification-center-sub{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:4px}
.notification-dot{position:absolute;right:-3px;top:-4px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--surface);display:none}
.notification-dot.show{display:block}

@media(max-width:390px){
  .header{
    grid-template-columns:44px 1fr auto;
    gap:5px;
    padding-left:8px;
    padding-right:8px;
  }
  .logo{max-width:42px;height:30px}
  .header-title{font-size:10px;letter-spacing:1.8px}
  .header-actions{gap:5px}
  .header-icon-btn{width:34px;height:34px;flex-basis:34px}
  .top-action{min-width:42px;width:42px;height:36px;padding:0;border-radius:11px}
  .top-action span{display:none}
  .top-action svg{width:14px;height:14px}
}
@media(max-width:330px){
  .header{grid-template-columns:36px 1fr auto}
  .logo{max-width:34px;height:26px}
  .header-title{font-size:9px;letter-spacing:1.3px}
  .header-icon-btn{width:32px;height:32px;flex-basis:32px}
  .top-action{width:36px;min-width:36px;height:34px}
}


/* v11: pedidos por correo, histórico y edición de comisiones */
.order-card{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--surface);margin-bottom:9px}
.order-card.sent{border-color:rgba(28,107,65,.24);background:linear-gradient(180deg,#fff 0%,var(--green-soft) 170%)}
.order-title{font-size:13px;font-weight:700}
.order-meta{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:4px}
.order-body{font-size:12px;line-height:1.55;color:var(--ink-2);white-space:pre-wrap;margin-top:10px}
.order-total{font-family:var(--mono);font-size:17px;font-weight:500;margin-top:8px}
.company-email-note{font-family:var(--mono);font-size:8px;color:var(--ink-3);line-height:1.5;margin-top:6px}

/* v12: filtros de clientes y favoritos personales */
.favorite-btn{width:34px;height:34px;border:1px solid var(--line);background:var(--surface);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex:0 0 auto}
.favorite-btn.active{background:var(--amber-soft);color:var(--amber);border-color:rgba(255,153,0,.25)}
.favorite-btn svg{width:16px;height:16px}
.client-filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.client-filter-grid .field:last-child{grid-column:1/-1}
.favorite-chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 8px;background:var(--amber-soft);color:var(--amber);font-family:var(--mono);font-size:8px;margin-top:8px}
.favorite-chip svg{width:10px;height:10px}
@media(max-width:370px){.client-filter-grid{grid-template-columns:1fr}.client-filter-grid .field:last-child{grid-column:auto}}

/* v15: buscador completo, importación avanzada, pedidos y teléfonos del equipo */
.order-status-pending{background:var(--amber-soft);color:var(--amber)}
.order-status-accepted{background:var(--green-soft);color:var(--green)}
.order-status-rejected{background:var(--red-soft);color:var(--red)}
.order-card.pending{border-color:rgba(255,153,0,.30);background:linear-gradient(180deg,#fff 0%,var(--amber-soft) 170%)}
.order-card.accepted{border-color:rgba(28,107,65,.28);background:linear-gradient(180deg,#fff 0%,var(--green-soft) 170%)}
.order-card.rejected{border-color:rgba(178,58,44,.25);background:linear-gradient(180deg,#fff 0%,var(--red-soft) 170%)}
.order-number{font-family:var(--mono);font-size:9px;color:var(--accent);margin-top:5px}
.orders-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.orders-summary .stat{padding:11px;text-align:center}
.orders-summary .stat b{font-size:18px}
.import-target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.conflict-choice.three{display:grid;grid-template-columns:1fr;gap:6px}
.team-phone{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;color:var(--ink-3);margin-top:5px}
.team-phone svg{width:11px;height:11px}
@media(max-width:370px){.import-target-grid{grid-template-columns:1fr}.orders-summary{grid-template-columns:1fr 1fr}}

/* v17: edición completa, avisos compartidos y notas privadas */
.private-note-card{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--surface-2);margin-bottom:10px}
.private-note-label{font-family:var(--mono);font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.shared-alert-card{border:1px solid rgba(255,153,0,.25);border-radius:12px;padding:13px;background:var(--amber-soft);margin-bottom:10px}
.shared-alert-title{font-family:var(--mono);font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--amber);margin-bottom:7px}

.productivity-comparison{display:flex;flex-direction:column;gap:11px}
.productivity-comparison-row{display:grid;grid-template-columns:minmax(92px,1.15fr) minmax(110px,2fr) 38px;gap:9px;align-items:center}
.productivity-comparison-name{font-size:11px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.productivity-comparison-track{height:12px;border-radius:999px;background:var(--line-soft);overflow:hidden}
.productivity-comparison-fill{height:100%;border-radius:999px;background:var(--ink);min-width:2px}
.productivity-comparison-value{font-family:var(--mono);font-size:10px;text-align:right}
.order-number-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.order-number-pill{border-radius:999px;padding:5px 8px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:8px}

/* v20: teléfono y cuenta atrás en visitas pendientes */
.pending-contact{display:flex;align-items:center;gap:6px;margin-top:7px;font-family:var(--mono);font-size:8.5px;color:var(--accent)}
.pending-contact svg{width:12px;height:12px;flex:0 0 auto}
.pending-contact a{color:inherit;text-decoration:none}
.visit-countdown{min-width:66px;border-radius:10px;padding:7px 8px;text-align:center;font-family:var(--mono);font-size:8px;line-height:1.35;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2)}
.visit-countdown b{display:block;font-size:13px;font-weight:600;color:var(--ink)}
.visit-countdown.today{background:var(--accent-soft);border-color:rgba(28,111,184,.22);color:var(--accent)}
.visit-countdown.overdue{background:var(--red-soft);border-color:rgba(178,58,44,.22);color:var(--red)}
.visit-countdown.soon{background:var(--amber-soft);border-color:rgba(255,153,0,.22);color:var(--amber)}

.contact-summary{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--surface-2);margin-bottom:10px}
.contact-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.contact-summary-item span{display:block;font-family:var(--mono);font-size:7.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:3px}
.contact-summary-item b,.contact-summary-item a{font-size:11.5px;color:var(--ink);text-decoration:none;word-break:break-word}
.timeline-chain{position:relative;padding-left:18px}.timeline-chain:before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:var(--line)}
.timeline-chain-item{position:relative;border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface);margin-bottom:9px}.timeline-chain-item:before{content:'';position:absolute;left:-17px;top:15px;width:9px;height:9px;border-radius:50%;background:var(--ink);border:2px solid var(--surface)}
.timeline-chain-item.current{border-color:rgba(28,111,184,.30);background:var(--accent-soft)}
.timeline-chain-date{font-family:var(--mono);font-size:8px;color:var(--ink-3)}.timeline-chain-title{font-size:12px;font-weight:700;margin-top:3px}.timeline-chain-text{font-size:11px;line-height:1.5;color:var(--ink-2);margin-top:6px}
.history-compact .card{padding:10px 12px}.history-compact .card-eyebrow,.history-compact .card-sub,.history-compact .chips{display:none}.history-compact .card-title{font-size:12px}.history-compact-toggle{font-family:var(--mono);font-size:8px;color:var(--ink-3)}

/* v24: nuevo pedido desde la sección Pedidos y pedidos invitados */
.order-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.order-mode-card{border:1px solid var(--line);border-radius:13px;padding:14px;background:var(--surface);cursor:pointer;text-align:left}
.order-mode-card:active{transform:scale(.99)}
.order-mode-card b{display:block;font-size:13px}
.order-mode-card span{display:block;font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:5px}
.guest-badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:8px;margin-top:7px}
.order-line{display:grid;grid-template-columns:1fr 82px 36px;gap:7px;align-items:end;margin-bottom:8px}
.order-line .field{margin-bottom:0}
.order-line-remove{height:42px;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.order-line-remove svg{width:13px;height:13px}
.order-lines-summary{font-family:var(--mono);font-size:8px;color:var(--ink-3);margin-top:6px}
@media(max-width:370px){.order-mode-grid{grid-template-columns:1fr}.order-line{grid-template-columns:1fr 72px 34px}}

.appointment-btn{background:var(--accent-soft);color:var(--accent);border-color:rgba(28,111,184,.22)}
.appointment-note{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:6px}

.info-row.copyable{grid-template-columns:105px 1fr;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:9px;padding-left:6px;padding-right:6px}
.info-row.copyable:active{background:var(--accent-soft)}
.copy-hint{font-family:var(--mono);font-size:7.5px;color:var(--ink-3);margin-top:8px;text-align:right}

/* v29: creación de usuarios y rol supervisor */
.role-badge.supervisor{background:var(--accent-soft);color:var(--accent)}
.user-admin-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.permission-section-title{font-family:var(--mono);font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);margin:14px 0 8px}
.role-description{font-family:var(--mono);font-size:8px;line-height:1.55;color:var(--ink-3);margin-top:7px}
.create-user-result{border:1px solid rgba(28,107,65,.22);border-radius:11px;padding:11px;background:var(--green-soft);margin-top:10px;font-size:11px}
@media(max-width:370px){.user-admin-actions{grid-template-columns:1fr}}

/* v30: alta manual y perfil personal */
.profile-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.password-strength-note{font-family:var(--mono);font-size:8px;line-height:1.5;color:var(--ink-3);margin-top:6px}
.profile-success{border:1px solid rgba(28,107,65,.22);border-radius:11px;padding:11px;background:var(--green-soft);font-size:11px;margin-top:10px}
@media(max-width:370px){.profile-actions{grid-template-columns:1fr}}

/* v31: datos de expedición e importación Excel */
.shipment-card{border:1px solid rgba(28,111,184,.22);border-radius:12px;padding:12px;background:var(--accent-soft);margin-top:10px}
.shipment-title{font-family:var(--mono);font-size:8px;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
.shipment-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.shipment-item span{display:block;font-family:var(--mono);font-size:7px;text-transform:uppercase;letter-spacing:.45px;color:var(--ink-3);margin-bottom:2px}
.shipment-item b,.shipment-item a{display:block;font-size:10.5px;color:var(--ink);text-decoration:none;word-break:break-word}
.shipment-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;border-radius:9px;padding:8px 10px;background:var(--surface);border:1px solid rgba(28,111,184,.22);font-family:var(--mono);font-size:8px;color:var(--accent);text-decoration:none}
.shipment-link svg{width:12px;height:12px}
.excel-import-result{border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--surface-2);font-size:11px;line-height:1.55;margin-top:10px}
.excel-import-result b{font-family:var(--mono)}
.order-toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
@media(max-width:370px){.shipment-grid{grid-template-columns:1fr}.order-toolbar{width:100%}.order-toolbar .btn{flex:1}}

.readonly-home-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--surface);margin-bottom:10px}
.readonly-home-title{font-size:15px;font-weight:700}.readonly-home-sub{font-size:11px;line-height:1.55;color:var(--ink-2);margin-top:5px}

function daysUntilVisit(date){
  if(!date)return null;
  const parts=String(date).split('-').map(Number);
  if(parts.length!==3||parts.some(n=>!Number.isFinite(n)))return null;
  const target=Date.UTC(parts[0],parts[1]-1,parts[2]);
  const now=new Date();
  const current=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((target-current)/86400000);
}
function visitCountdownHtml(a){
  if(a.status!=='pending')return '';
  const days=daysUntilVisit(a.date);
  if(days===null)return '';
  if(days<0){
    const n=Math.abs(days);
    return `<div class="visit-countdown overdue"><b>${n}</b>${n===1?'día atrasada':'días atrasada'}</div>`;
  }
  if(days===0)return `<div class="visit-countdown today"><b>Hoy</b>Visita</div>`;
  if(days===1)return `<div class="visit-countdown soon"><b>1</b>día restante</div>`;
  return `<div class="visit-countdown ${days<=3?'soon':''}"><b>${days}</b>días restantes</div>`;
}

    c.contact,c.address,c.population,c.province,c.zip,c.agent,c.type,c.notes,
    co.name,
    ...(c.assignedUserIds||[]).map(memberName)
  ];
  return norm(values.filter(Boolean).join(' '));
}
function matchesClient(c,q){
  const query=norm(q);

  const haystack=clientSearchText(c);
  const terms=query.split(/\s+/).filter(Boolean);

function getFilteredClients(){
  const q=clientSearchTerm;
  const f=clientFiltersState;
  let arr=visibleClients().filter(c=>matchesClient(c,q));
  if(f.company!=='all')arr=arr.filter(c=>c.companyId===f.company);
  if(f.favorite==='favorites')arr=arr.filter(c=>isFavoriteClient(c.id));
  if(f.province!=='all')arr=arr.filter(c=>norm(c.province||'')===norm(f.province));
  if(f.population!=='all')arr=arr.filter(c=>norm(c.population||'')===norm(f.population));
  arr.sort((a,b)=>Number(isFavoriteClient(b.id))-Number(isFavoriteClient(a.id))||company(a.companyId).name.localeCompare(company(b.companyId).name)||String(a.fiscalName||a.commercialName||'').localeCompare(String(b.fiscalName||b.commercialName||''),'es',{sensitivity:'base'}));
  return arr;
}

function renderCalendar(){
  const y=calDate.getFullYear(), m=calDate.getMonth(); const first=new Date(y,m,1); const start=new Date(first); start.setDate(first.getDate()-((first.getDay()+6)%7)); const cells=[];
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i); const iso=localISODate(d); const acts=visibleActivities().filter(a=>a.date===iso); const colors=[...new Set(acts.map(a=>company(a.companyId).color))]; const statuses=[...new Set(acts.map(a=>a.status))]; cells.push(`<div class="day ${d.getMonth()!==m?'out':''} ${iso===today()?'today':''} ${statuses.includes('pending')?'has-pending':''} ${statuses.includes('done')?'has-done':''}" onclick="openDay('${iso}')"><div class="day-num">${d.getDate()}</div><div class="day-status">${statuses.map(s=>`<span class="day-status-dot ${s}" title="${s==='pending'?'Pendiente':s==='done'?'Realizada':'Cancelada'}"></span>`).join('')}</div><div class="points">${colors.map(c=>`<span class="point" style="background:${c}"></span>`).join('')}</div></div>`)}
  $('#view-calendario').innerHTML=`<div class="calendar-head"><button class="icon-btn" onclick="calDate.setMonth(calDate.getMonth()-1);renderCalendar()">${ICONS.chevronLeft}</button><div class="calendar-title">${calDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div><button class="icon-btn" onclick="calDate.setMonth(calDate.getMonth()+1);renderCalendar()">${ICONS.chevron}</button></div><div class="cal"><div class="cal-week">${['L','M','X','J','V','S','D'].map(x=>`<div>${x}</div>`).join('')}</div><div class="cal-grid">${cells.join('')}</div></div>`;
}


function repairClientPopulations(){
  let repaired=0;
  state.clients.forEach(c=>{
    if(!String(c.population||'').trim()&&String(c.city||'').trim()){
      c.population=String(c.city).trim();
      repaired++;
    }
    if(!String(c.province||'').trim()&&String(c.state||'').trim()){
      c.province=String(c.state).trim();
      repaired++;
    }
  });
  save();render();toast(repaired?`${repaired} población(es) reparada(s).`:'No había poblaciones pendientes de reparar.');
}

function normalizeExternalUrl(url){
  const value=String(url||'').trim();
  if(!value)return '';
  return /^https?:\/\//i.test(value)?value:`https://${value}`;
}

async function copyTextValue(value,label='Dato'){
  const text=String(value??'').trim();
  if(!text)return toast('No hay información para copiar.');
  try{
    if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text);
    else{const area=document.createElement('textarea');area.value=text;area.style.position='fixed';area.style.opacity='0';document.body.appendChild(area);area.select();if(!document.execCommand('copy'))throw new Error('copy');area.remove()}
    toast(`${label} copiado.`);
  }catch(e){console.error(e);toast('No se pudo copiar. Mantén pulsado sobre el texto.');}
}

function addBusinessDays(dateValue,days){
  const d=dateValue instanceof Date?new Date(dateValue):new Date(`${dateValue||today()}T12:00:00`);
  let remaining=Number(days)||0;
  while(remaining>0){
    d.setDate(d.getDate()+1);
    const day=d.getDay();
    if(day!==0&&day!==6)remaining--;
  }
  return localISODate(d);
}
function nextBusinessDay(dateValue){return addBusinessDays(dateValue,1)}
function installationFlow(id){return state.installationFlows.find(f=>f.id===id)}
function flowForOrder(orderId){return state.installationFlows.find(f=>f.orderId===orderId)}
function flowStageLabel(stage){
  return stage==='delivery_review'?'Revisar entrega':
    stage==='installation_review'?'Concertar instalación':
    stage==='final_followup'?'Seguimiento final':'Finalizado';
}
function flowStatusLabel(status){
  return status==='pending_delivery'?'Pendiente de entrega':
    status==='delivery_confirmed'?'Entrega confirmada':
    status==='waiting_for_installation'?'Pendiente de instalación':
    status==='installation_scheduled'?'Instalación programada':
    status==='waiting_for_final_followup'?'Seguimiento final pendiente':
    status==='completed'?'Finalizado':
    status==='cancelled'?'Cancelado':status;
}
function addFlowEvent(flow,title,text='',activityId=''){
  flow.events=flow.events||[];
  flow.events.push({id:uid(),createdAt:new Date().toISOString(),userId:currentUser?.id||'',title,text,activityId});
  flow.updatedAt=new Date().toISOString();
}
function activeFlowActivity(flowId,stage=''){
  return state.activities.find(a=>a.installationFlowId===flowId&&a.status==='pending'&&(!stage||a.flowStage===stage));
}
function createFlowActivity(flow,stage,date,todo,assignedUserId,parentId='',forceNew=false){
  const existing=forceNew?null:activeFlowActivity(flow.id,stage);
  if(existing)return existing;
  const c=client(flow.clientId);
  const activity={
    id:uid(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    companyId:flow.companyId,clientId:flow.clientId,assignedUserId:assignedUserId||flow.ownerUserId,
    assignedAt:new Date().toISOString(),assignedBy:currentUser?.id||flow.ownerUserId,
    type:'followup',status:'pending',parentId:parentId||'',date,time:'09:00',
    mode:'Llamada',place:'',todo,doneText:'',installationFlowId:flow.id,flowStage:stage,flowResult:''
  };
  state.activities.push(activity);
  flow.currentActivityId=activity.id;
  flow.currentStage=stage;
  addFlowEvent(flow,`Seguimiento programado: ${todo}`,`Fecha: ${fmtDate(date)} · Responsable: ${memberName(activity.assignedUserId)}`,activity.id);
  return activity;
}
function startEquipmentInstallationFlow(order){
  if(order.guest||!order.clientId)return null;
  const existing=flowForOrder(order.id);
  if(existing)return existing;
  const flow={
    id:uid(),orderId:order.id,clientId:order.clientId,companyId:order.companyId,
    ownerUserId:order.userId,createdBy:currentUser?.id||order.userId,createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),status:'pending_delivery',currentStage:'delivery_review',
    deliveryConfirmedAt:'',installationDate:'',installationTime:'',finalAssignedUserId:'',
    completedAt:'',completedBy:'',finalResult:'',events:[]
  };
  state.installationFlows.push(flow);
  order.installationFlowId=flow.id;
  addFlowEvent(flow,'Pedido de envío de equipo creado',`Albarán: ${order.orderNumber}`);
  createFlowActivity(flow,'delivery_review',addBusinessDays(today(),2),'Revisar entrega del equipo',order.userId);
  return flow;
}

function toggleInstallationDateFields(){

function completeDeliveryReview(activityId){
  const a=state.activities.find(x=>x.id===activityId);
  const flow=installationFlow(a?.installationFlowId);
  if(!a||!flow)return toast('No se ha encontrado el seguimiento.');

  const result=$('#flowDeliveryResult')?.value||'';
  const notes=$('#flowDeliveryNotes')?.value.trim()||'';
  if(!result)return toast('Selecciona si se ha entregado.');
  const saveButton=$('#saveDeliveryReviewBtn');
  if(saveButton){saveButton.disabled=true;saveButton.querySelector('span').textContent='Guardando…';}

  const completedAt=new Date().toISOString();
  a.status='done';
  a.flowResult=result;
  a.doneText=notes||(`Entrega: ${result==='yes'?'Sí':'No'}`);
  a.updatedAt=completedAt;
  a.completedAt=completedAt;
  a.completedBy=currentUser?.id||'';

  // Clear the pointer before creating the next activity, so the current
  // delivery review can never be mistaken for the new pending follow-up.
  flow.currentActivityId='';
  flow.updatedAt=completedAt;

  let nextActivity=null;

  if(result==='yes'){
    flow.deliveryConfirmedAt=completedAt;
    flow.status='delivery_confirmed';
    addFlowEvent(flow,'Entrega confirmada',notes,a.id);

    const nextDate=nextBusinessDay(a.date||today());
    nextActivity=createFlowActivity(
      flow,
      'installation_review',
      nextDate,
      'Revisar si el cliente ha concertado la instalación',
      a.assignedUserId||flow.ownerUserId,
      a.id,
      true
    );
    flow.status='waiting_for_installation';
  }else{
    flow.status='pending_delivery';
    addFlowEvent(flow,'Equipo todavía no entregado',notes,a.id);

    const nextDate=nextBusinessDay(a.date||today());
    nextActivity=createFlowActivity(
      flow,
      'delivery_review',
      nextDate,
      'Volver a revisar la entrega del equipo',
      a.assignedUserId||flow.ownerUserId,
      a.id,
      true
    );
  }

  if(!nextActivity||!state.activities.some(x=>x.id===nextActivity.id&&x.status==='pending')){
    a.status='pending';
    a.completedAt='';
    a.completedBy='';
    if(saveButton){saveButton.disabled=false;saveButton.querySelector('span').textContent='Guardar resultado';}
    return toast('No se pudo crear el siguiente seguimiento. Vuelve a intentarlo.');
  }

  flow.currentActivityId=nextActivity.id;
  save();
  closeSheet();
  render();
  toast(`Siguiente seguimiento creado para el ${fmtDate(nextActivity.date)}.`);
}
function completeInstallationReview(activityId){
  const a=state.activities.find(x=>x.id===activityId),flow=installationFlow(a?.installationFlowId);
  if(!a||!flow)return;
  const result=$('#flowInstallationResult')?.value||'',notes=$('#flowInstallationNotes')?.value.trim()||'';
  if(!result)return toast('Selecciona el resultado de la llamada.');
  const scheduled=['scheduled','scheduled_now'].includes(result);
  const date=$('#flowInstallationDate')?.value||'',time=$('#flowInstallationTime')?.value||'';
  if(scheduled&&!date)return toast('Selecciona el día de instalación.');
  a.status='done';a.flowResult=result;a.doneText=notes||(`Instalación: ${scheduled?'Concertada':'No concertada'}`);a.updatedAt=new Date().toISOString();
  if(scheduled){
    flow.installationDate=date;flow.installationTime=time;flow.status='installation_scheduled';
    addFlowEvent(flow,'Instalación concertada',`${fmtDate(date)} ${time} ${notes}`.trim(),a.id);
    openAssignFinalFollowup(flow.id,a.id);
    return;
  }
  addFlowEvent(flow,'Llamada realizada: continúa sin instalación',notes,a.id);
  createFlowActivity(flow,'installation_review',nextBusinessDay(today()),'Volver a contactar para concertar instalación',a.assignedUserId,a.id);
  flow.status='waiting_for_installation';
  save();closeSheet();render();toast('Nueva llamada programada.');
}
function openAssignFinalFollowup(flowId,parentActivityId){
  const flow=installationFlow(flowId);if(!flow)return;

    <div class="field"><label>Usuario responsable</label><select id="flowFinalAssignee">${teamMembers.map(m=>`<option value="${m.user_id}" ${m.user_id===flow.ownerUserId?'selected':''}>${esc(m.display_name||m.email)}</option>`).join('')}</select></div>

function createFinalFollowup(flowId,parentActivityId){
  const flow=installationFlow(flowId);if(!flow)return;
  const assignee=$('#flowFinalAssignee')?.value||flow.ownerUserId;
  flow.finalAssignedUserId=assignee;flow.status='waiting_for_final_followup';
  const activity=createFlowActivity(flow,'final_followup',nextBusinessDay(flow.installationDate),'Realizar seguimiento final después de la instalación',assignee,parentActivityId);
  addFlowEvent(flow,'Seguimiento final asignado',`Responsable: ${memberName(assignee)} · Fecha: ${fmtDate(activity.date)}`,activity.id);
  save();render();
  const member=teamMembers.find(m=>m.user_id===assignee);
  const order=state.orders.find(o=>o.id===flow.orderId);
  if(member?.email){
    const subject=`Seguimiento final · ${clientName(flow.clientId)} · Albarán ${order?.orderNumber||''}`;
    const body=`Se te ha asignado un seguimiento final.\n\nCliente: ${clientName(flow.clientId)}\nEmpresa: ${company(flow.companyId).name}\nAlbarán: ${order?.orderNumber||'—'}\nFecha instalación: ${fmtDate(flow.installationDate)} ${flow.installationTime||''}\nFecha seguimiento: ${fmtDate(activity.date)}`;
    window.location.href=`mailto:${encodeURIComponent(member.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
  closeSheet();toast('Seguimiento final asignado.');
}
function completeFinalFollowup(activityId){
  const a=state.activities.find(x=>x.id===activityId),flow=installationFlow(a?.installationFlowId);
  if(!a||!flow)return;
  const result=$('#flowFinalResult')?.value||'',notes=$('#flowFinalNotes')?.value.trim()||'';
  if(!result)return toast('Selecciona un resultado final.');
  a.status='done';a.flowResult=result;a.doneText=notes;a.updatedAt=new Date().toISOString();
  flow.status='completed';flow.currentStage='completed';flow.finalResult=result;flow.completedAt=new Date().toISOString();flow.completedBy=currentUser.id;
  addFlowEvent(flow,'Proceso finalizado',`${result}${notes?' · '+notes:''}`,a.id);
  save();closeSheet();render();toast('Flujo finalizado.');
}

function normalizeOrderMatchValue(value){
  if(value===null||value===undefined)return '';
  let text=String(value).trim();
  if(/^\d+\.0+$/.test(text))text=text.replace(/\.0+$/,'');
  return text.replace(/\s+/g,'').toUpperCase();
}
function shipmentCellValue(row,aliases){
  for(const alias of aliases){
    const key=Object.keys(row).find(k=>norm(k)===norm(alias));
    if(key!==undefined&&row[key]!==undefined&&row[key]!==null&&String(row[key]).trim()!=='')return row[key];
  }
  return '';
}
function excelSerialOrTextDate(value){
  if(value===null||value===undefined||value==='')return '';
  if(typeof value==='number'&&window.XLSX?.SSF){
    const d=XLSX.SSF.parse_date_code(value);
    if(d)return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
  }
  return String(value).trim();
}

  if(!hasPermission('importShipmentExcel'))return toast('No tienes permiso para importar Excel de seguimientos.');
  openSheet('Importar expediciones','Excel de seguimiento de pedidos',`

      <label class="btn full primary" style="margin-top:12px;margin-bottom:0">${ICONS.upload}<span>Seleccionar Excel</span><input type="file" class="hidden" accept=".xls,.xlsx,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" onchange="importShipmentExcel(this.files?.[0])"></label>
    </div>
    <div class="small">La aplicación detecta automáticamente dos formatos. Puede comparar el albarán con: Su referencia, 2ªRef.Cliente, Num.Pedido Original, Referencia Int. o Referencia.</div>
    <div id="shipmentExcelResult"></div>
  `);
}
function detectShipmentExcelFormat(matrix){
  for(let index=0;index<Math.min(matrix.length,30);index++){
    const normalized=(matrix[index]||[]).map(cell=>norm(cell));
    const has=(name)=>normalized.includes(norm(name));
    if(has('Número expedición')&&has('Su referencia')){
      return {type:'logistics',headerIndex:index};
    }
    if(has('Nº de envío')&&has('Referencia')&&has('CP Destinatario')&&has('Destino')){
      return {type:'ctt',headerIndex:index};
    }
  }
  return null;
}
function shipmentExcelRowData(row,format){
  if(format==='ctt'){
    return {
      references:[shipmentCellValue(row,['Referencia'])],
      shipmentNumber:String(shipmentCellValue(row,['Nº de envío','N° de envío','Numero de envio'])||'').replace(/\.0+$/,''),
      shipmentDepartureDate:excelSerialOrTextDate(shipmentCellValue(row,['Fecha'])),
      shipmentReference:String(shipmentCellValue(row,['Referencia'])||'').replace(/\.0+$/,''),
      shipmentDestination:String(shipmentCellValue(row,['Destino'])||''),
      shipmentDestinationPostalCode:String(shipmentCellValue(row,['CP Destinatario'])||'').replace(/\.0+$/,'').padStart(5,'0'),
      shipmentPackages:shipmentCellValue(row,['Bultos']),
      shipmentDeliveredPackages:'',
      shipmentWeight:'',
      shipmentTrackingUrl:''
    };
  }
  return {
    references:[
      shipmentCellValue(row,['Su referencia']),
      shipmentCellValue(row,['2ªRef.Cliente','2aRef.Cliente']),
      shipmentCellValue(row,['Num.Pedido Original','Num. Pedido Original']),
      shipmentCellValue(row,['Referencia Int'])
    ],
    shipmentNumber:String(shipmentCellValue(row,['Número expedición','Numero expedicion'])||'').replace(/\.0+$/,''),
    shipmentDepartureDate:excelSerialOrTextDate(shipmentCellValue(row,['Fec. Salida Exp'])),
    shipmentReference:String(shipmentCellValue(row,['Su referencia'])||'').replace(/\.0+$/,''),
    shipmentDestination:String(shipmentCellValue(row,['Plaza Destino'])||''),
    shipmentDestinationPostalCode:String(shipmentCellValue(row,['CP Destinatario'])||'').replace(/\.0+$/,''),
    shipmentPackages:shipmentCellValue(row,['Número de bultos','Numero de bultos']),
    shipmentDeliveredPackages:shipmentCellValue(row,['Bultos Repartidos']),
    shipmentWeight:shipmentCellValue(row,['Peso']),
    shipmentTrackingUrl:String(shipmentCellValue(row,['Enlace de seguimiento'])||'')
  };
}
async function importShipmentExcel(file){
  if(!file)return;
  if(!hasPermission('importShipmentExcel'))return toast('No tienes permiso para importar Excel de seguimientos.');
  if(!window.XLSX)return toast('No se ha podido cargar el lector de Excel.');
  const result=$('#shipmentExcelResult');
  if(result)result.innerHTML='<div class="excel-import-result">Leyendo archivo…</div>';
  try{
    const buffer=await file.arrayBuffer();
    const workbook=XLSX.read(buffer,{type:'array',cellDates:false,raw:true});
    const firstSheet=workbook.Sheets[workbook.SheetNames[0]];
    const matrix=XLSX.utils.sheet_to_json(firstSheet,{header:1,defval:'',raw:true});
    const detected=detectShipmentExcelFormat(matrix);
    if(!detected)throw new Error('El archivo no coincide con ninguno de los formatos de expediciones admitidos.');

    const headers=matrix[detected.headerIndex].map(value=>String(value).trim());
    const rows=matrix.slice(detected.headerIndex+1)
      .filter(row=>row.some(value=>String(value).trim()!==''))
      .map(row=>Object.fromEntries(headers.map((header,index)=>[header,row[index]??''])));

    const orderMap=new Map();
    state.orders.forEach(order=>{
      const key=normalizeOrderMatchValue(order.orderNumber);
      if(key){
        if(!orderMap.has(key))orderMap.set(key,[]);
        orderMap.get(key).push(order);
      }
    });

    let updated=0,unmatched=0,ambiguous=0,rowsProcessed=0;
    const unmatchedRefs=[];

    rows.forEach(row=>{
      rowsProcessed++;
      const shipment=shipmentExcelRowData(row,detected.type);
      const candidates=shipment.references
        .map(normalizeOrderMatchValue)
        .filter(Boolean);

      const matches=[];
      candidates.forEach(candidate=>{
        (orderMap.get(candidate)||[]).forEach(order=>{
          if(!matches.includes(order))matches.push(order);
        });
      });

      if(!matches.length){
        unmatched++;
        const reference=shipment.references.find(value=>String(value||'').trim());
        if(reference&&unmatchedRefs.length<12)unmatchedRefs.push(String(reference));
        return;
      }

      if(matches.length>1)ambiguous++;

      matches.forEach(order=>{
        Object.assign(order,{
          shipmentNumber:shipment.shipmentNumber,
          shipmentDepartureDate:shipment.shipmentDepartureDate,
          shipmentReference:shipment.shipmentReference,
          shipmentDestination:shipment.shipmentDestination,
          shipmentDestinationPostalCode:shipment.shipmentDestinationPostalCode,
          shipmentPackages:shipment.shipmentPackages,
          shipmentDeliveredPackages:shipment.shipmentDeliveredPackages,
          shipmentWeight:shipment.shipmentWeight,
          shipmentTrackingUrl:shipment.shipmentTrackingUrl,
          shipmentImportedAt:new Date().toISOString(),
          shipmentImportedBy:currentUser.id,
          shipmentImportFormat:detected.type,
          updatedAt:new Date().toISOString(),
          updatedBy:currentUser.id
        });
        updated++;
      });
    });

    save();
    render();

    const formatLabel=detected.type==='ctt'
      ?'Formato Nº de envío / Referencia'
      :'Formato expediciones con Su referencia';

    if(result)result.innerHTML=`<div class="excel-import-result">
      <b>Importación terminada</b><br>
      Formato detectado: ${esc(formatLabel)}<br>
      Filas procesadas: ${rowsProcessed}<br>
      Pedidos actualizados: ${updated}<br>
      Filas sin coincidencia: ${unmatched}<br>
      Coincidencias múltiples: ${ambiguous}
      ${unmatchedRefs.length?`<br><br><b>Referencias no encontradas:</b><br>${unmatchedRefs.map(esc).join(' · ')}`:''}
    </div>`;

    toast(`${updated} pedido(s) actualizado(s).`);
  }catch(error){
    console.error(error);
    if(result)result.innerHTML=`<div class="excel-import-result"><b>Error:</b> ${esc(error.message||'No se pudo leer el Excel.')}</div>`;
    toast(error.message||'No se pudo importar el Excel.');
  }
}

 id="saveActivityBtn" type="button">${ICONS.check}<span>Guardar actividad</span></button>`;

function bindActivityForm(){
  $('#actCompany')?.addEventListener('change',()=>{
    const selected=client($('#actClient')?.value);
    if(selected&&selected.companyId!==$('#actCompany').value){$('#actClient').value='';$('#clientQuery').value='';$('#actPlace').value='';$('#mapsLink').innerHTML='';}

  });
  ['actType','actStatus','actParent','actAssignee'].forEach(id=>$('#'+id)?.addEventListener('change',refreshActivityForm));
  $('#clientQuery')?.addEventListener('input',()=>{$('#actClient').value='';refreshClientPicker();refreshActivityForm();});
  $('#saveActivityBtn')?.addEventListener('click',saveActivity);
  const a=activityEditId?state.activities.find(x=>x.id===activityEditId):null;
  if(a){$('#actType').value=a.type;$('#actStatus').value=a.status;$('#actMode').value=a.mode||'Presencial';}

}
function refreshClientPicker(){

    nextTodo:$('#nextTodo')?.value||'',

        const p=state.activities.find(x=>x.id===currentParentValue);

      $('#actParent').innerHTML='<option value="">Selecciona visita anterior</option>'+

      if(currentParentValue&&parents.some(p=>p.id===currentParentValue))$('#actParent').value=currentParentValue;
    }else{
      $('#actParent').innerHTML='<option value="">Primero selecciona un cliente</option>';
    }
  }

  let dyn='';

  const inherited=parent?.todo||'';

  }
  if(status==='pending'){
    dyn+=`<div class="field"><label>Qué debo tratar en esta visita</label><textarea id="actTodo">${esc(transient.actTodo||a?.todo||inherited||'')}</textarea></div>`;
  }

    dyn+=`<div class="field"><label>Qué he tratado</label><textarea id="actDone">${esc(transient.actDone||a?.doneText||'')}</textarea></div><label class="small"><input type="checkbox" id="createNext" ${(transient.createNext||a?.createNext)?'checked':''} onchange="refreshActivityForm()"> Programar siguiente seguimiento</label>`;
  }
  if(status==='done'&&(transient.createNext||a?.createNext)){
    dyn+=`<div class="field"><label>Qué quiero tratar en el siguiente seguimiento</label><textarea id="nextTodo">${esc(transient.nextTodo||a?.nextTodo||'')}</textarea></div><div class="grid2" style="margin-bottom:0"><div class="field"><label>Fecha seguimiento</label><input type="date" id="nextDate" value="${esc(transient.nextDate||a?.nextDate||'')}"></div><div class="field"><label>Hora</label><input type="time" id="nextTime" value="${esc(transient.nextTime||a?.nextTime||'09:00')}"></div></div>`;

function saveActivity(){
  const cid=$('#actClient').value, type=$('#actType').value, status=$('#actStatus').value;
  if(!cid)return toast('Selecciona un cliente.');
  const selectedClient=client(cid);
  const co=type==='followup'?(selectedClient?.companyId||''):$('#actCompany').value;
  if(!co)return toast(type==='followup'?'El cliente no tiene una empresa asociada.':'Selecciona una empresa.');
  if(!selectedClient||selectedClient.companyId!==co)return toast('El cliente debe pertenecer a la empresa seleccionada.');
  const assigneeForValidation=isAdmin()?($('#actAssignee')?.value||''):(currentUser?.id||'');
  if(assigneeForValidation&&!clientsForMember(assigneeForValidation).some(c=>c.id===cid))return toast('Ese cliente no está asignado al comercial seleccionado.');
  if(type==='first'&&hasFirst(cid)&&!(activityEditId&&state.activities.find(a=>a.id===activityEditId)?.type==='first'))return toast('Este cliente ya tiene una primera visita. Debes crear un seguimiento.');
  if(type==='followup'&&!$('#actParent').value)return toast('Selecciona una visita anterior realizada para crear el seguimiento.');
  if(type==='followup'&&state.activities.some(a=>a.id!==activityEditId&&a.parentId===$('#actParent').value))return toast('Esa visita ya tiene seguimiento. Elige otra visita anterior.');
  if(status==='pending'&&type==='followup'&&overlaps($('#actDate').value,$('#actTime').value,activityEditId))return toast('Ya existe un seguimiento pendiente a esa hora.');
  let a=activityEditId?state.activities.find(x=>x.id===activityEditId):null;
  const wasNew=!a;
  const previousAssignee=a?.assignedUserId||'';
  if(!a){a={id:uid(),createdAt:new Date().toISOString()};state.activities.push(a)}
  const newAssignee=isAdmin()?($('#actAssignee')?.value||''):(currentUser?.id||'');
  Object.assign(a,{
    companyId:co,clientId:cid,assignedUserId:newAssignee,type,status,
    parentId:type==='followup'?$('#actParent').value:'',
    date:$('#actDate').value,time:$('#actTime').value,mode:$('#actMode').value,
    place:$('#actPlace').value,todo:$('#actTodo')?.value||'',
    doneText:$('#actDone')?.value||'',inheritedTreated:!!$('#inheritedTreated')?.checked,
    updatedAt:new Date().toISOString(),updatedBy:currentUser?.id||''
  });
  if(newAssignee&&(wasNew||previousAssignee!==newAssignee)){
    a.assignedAt=new Date().toISOString();
    a.assignedBy=currentUser?.id||'';
  }
  const createNextChecked=!!$('#createNext')?.checked;
  const nextTodoValue=$('#nextTodo')?.value.trim()||'';
  const nextDateValue=$('#nextDate')?.value||'';
  const nextTimeValue=$('#nextTime')?.value||'09:00';
  a.createNext=createNextChecked;
  a.nextTodo=nextTodoValue;
  a.nextDate=nextDateValue;
  a.nextTime=nextTimeValue;

  if(createNextChecked){
    if(!nextTodoValue)return toast('Indica qué quieres tratar en el siguiente seguimiento.');
    if(!nextDateValue)return toast('Selecciona la fecha del siguiente seguimiento.');
    const existingChild=state.activities.find(x=>x.parentId===a.id);
    if(existingChild){
      Object.assign(existingChild,{
        companyId:co,clientId:cid,assignedUserId:newAssignee,
        date:nextDateValue,time:nextTimeValue,type:'followup',status:'pending',
        todo:nextTodoValue,updatedAt:new Date().toISOString(),updatedBy:currentUser?.id||''
      });
    }else{
      state.activities.push({
        id:uid(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
        companyId:co,clientId:cid,assignedUserId:newAssignee,
        assignedAt:newAssignee?new Date().toISOString():'',
        assignedBy:currentUser?.id||'',type:'followup',status:'pending',parentId:a.id,
        date:nextDateValue,time:nextTimeValue,
        mode:a.mode||'Presencial',place:a.place||selectedClient?.address||'',
        todo:nextTodoValue,doneText:''
      });
    }
  }
  save();closeSheet();render();toast('Visita guardada.');
}
function overlaps(date,time,ignore){return date&&time&&state.activities.some(a=>a.id!==ignore&&a.status==='pending'&&a.type==='followup'&&a.date===date&&a.time===time)}


function activityChain(activityId){
  const current=state.activities.find(a=>a.id===activityId);
  if(!current||!canViewActivity(current))return [];
  const chain=[];
  const visited=new Set();
  let node=current;
  while(node&&!visited.has(node.id)&&canViewActivity(node)){
    visited.add(node.id);
    chain.unshift(node);
    const parent=node.parentId?state.activities.find(a=>a.id===node.parentId):null;
    node=parent&&canViewActivity(parent)?parent:null;
  }
  return chain;
}
function activityChainHtml(activityId){
  const chain=activityChain(activityId);
  if(!chain.length)return `<div class="small">No hay visitas anteriores vinculadas.</div>`;
  return `<div class="timeline-chain">${chain.map((item,index)=>`
    <div class="timeline-chain-item ${item.id===activityId?'current':''}" onclick="openActivityDetail('${item.id}')">
      <div class="timeline-chain-date">${index===0?'Inicio · ':''}${fmtDate(item.date)}${item.time?' · '+esc(item.time):''}</div>
      <div class="timeline-chain-title">${item.type==='first'?'Primera visita':'Seguimiento'} · ${item.status==='done'?'Realizada':item.status==='cancelled'?'Cancelada':'Pendiente'}</div>
      ${item.todo?`<div class="timeline-chain-text"><b>A tratar:</b> ${esc(item.todo)}</div>`:''}
      ${item.doneText?`<div class="timeline-chain-text"><b>Tratado:</b> ${esc(item.doneText)}</div>`:''}
      <div class="timeline-chain-text"><b>Comercial:</b> ${esc(item.assignedUserId?memberName(item.assignedUserId):'Sin asignar')}</div>
    </div>`).join('')}</div>`;
}

async function deleteActivity(id){
  if(!hasPermission('deleteVisits'))return toast('No tienes permiso para eliminar visitas.');
  const kids=activityChildren(id);
  const msg=kids.length?`Esta visita tiene ${kids.length} seguimiento(s) encadenados. Se eliminará toda la cadena.`:'Esta visita se eliminará de forma permanente.';
  const ok=await showConfirm('Eliminar visita',msg); if(!ok)return;

function parseCSV(text){text=text.replace(/^\uFEFF/,''); const sample=text.slice(0,2000); const sep=(sample.match(/;/g)||[]).length>(sample.match(/,/g)||[]).length?';':','; const rows=[]; let row=[],cur='',q=false; for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1]; if(ch==='"'){if(q&&n==='"'){cur+='"';i++}else q=!q} else if(ch===sep&&!q){row.push(cur);cur=''} else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++; row.push(cur); if(row.some(x=>x.trim()))rows.push(row); row=[]; cur=''} else cur+=ch} row.push(cur); if(row.some(x=>x.trim()))rows.push(row); return rows;}
function mapHeader(h){
  const n=norm(h).replace(/[^a-z0-9]/g,'');
  const exact={codigo:'code',cod:'code',nombrefiscal:'fiscalName',nombre:'fiscalName',razonsocial:'fiscalName',nombrecomercial:'commercialName',telefono:'phone',telefonos:'phone',tlf:'phone',tel:'phone',fax:'fax',movil:'mobile',email:'email',email1:'email',correoelectronico:'email',personadecontacto:'contact',contacto:'contact',nif:'nif',cif:'nif',dni:'nif',nifcif:'nif',agente:'agent',tipodecliente:'type',tipo:'type',direccion:'address',domicilio:'address',ubicacion:'address',poblacion:'population',localidad:'population',ciudad:'population',provincia:'province',cp:'zip',codpostal:'zip',codigopostal:'zip'};
  if(exact[n]!==undefined) return exact[n];
  // Fallback: keyword matching so small header variations (real-world exports rarely match exactly) still map correctly.
  if(n==='') return '';
  if(/postal/.test(n)) return 'zip';
  if(/comercial/.test(n) && /nombre/.test(n)) return 'commercialName';
  if(/fiscal/.test(n) || /razonsocial/.test(n)) return 'fiscalName';
  if(/^nombre/.test(n)) return 'fiscalName';
  if(/movil|celular/.test(n)) return 'mobile';
  if(/^tel|^tlf|telefono/.test(n)) return 'phone';
  if(/^fax/.test(n)) return 'fax';
  if(/mail/.test(n)) return 'email';
  if(/contacto/.test(n)) return 'contact';
  if(/^nif|^cif|^dni/.test(n)) return 'nif';
  if(/agente/.test(n)) return 'agent';
  if(/^tipo/.test(n)) return 'type';
  if(/direccion|domicilio|ubicacion/.test(n)) return 'address';
  if(/poblacion|localidad|ciudad/.test(n)) return 'population';
  if(/provincia/.test(n)) return 'province';
  if(/^codigo$|^cod$/.test(n)) return 'code';
  return '';
}
function clientKey(obj){return norm(obj.code)||norm(obj.nif)||norm(obj.fiscalName)}
function checkImportCompanySelected(){
  const sel=$('#importCompany');
  if(!sel.value){
    sel.classList.add('field-error');
    sel.focus();
    toast('Selecciona primero la empresa destino.');
    return false; // cancels the native file picker so nothing silently fails
  }
  sel.classList.remove('field-error');
  return true;
}
function importCSV(file){const co=$('#importCompany').value; const assignee=$('#importAssignee')?.value||''; if(!co)return toast('Selecciona la empresa destino antes de importar.'); if(!file)return; const r=new FileReader(); r.onload=()=>processCSV(String(r.result),co,assignee); r.onerror=()=>{$('#importResult').innerHTML=`<div class="import-summary danger-text">No se ha podido leer el archivo. Comprueba que sea un CSV válido.</div>`}; r.readAsText(file,'utf-8');}
function processCSV(text,companyId,assigneeId=''){try{
  const importAssigneeIds=assigneeId==='__all_commercials__'
    ?teamMembers.filter(m=>m.role==='commercial').map(m=>m.user_id)
    :(assigneeId?[assigneeId]:[]);
  const rows=parseCSV(text);
  if(rows.length<2)throw new Error('El archivo está vacío o no contiene filas de datos.');
  const headers=rows[0].map(mapHeader);
  if(!headers.includes('fiscalName')&&!headers.includes('commercialName'))throw new Error('No se ha reconocido ninguna columna de nombre de cliente. Revisa las cabeceras del CSV (Nombre fiscal / Nombre comercial).');
  let added=0,skipped=0,populationsCompleted=0,conflicts=[];
  rows.slice(1).forEach((row,i)=>{
    let o={id:uid(),companyId,order:i+1,population:'',assignedUserIds:[...importAssigneeIds],createdAt:new Date().toISOString()};
    row.forEach((v,idx)=>{const k=headers[idx]; if(k&&!o[k])o[k]=String(v||'').trim()});
    if(!o.address){o.address=[o.direccion,o.zip,o.city,o.province].filter(Boolean).join(' ')}
    if(!o.fiscalName&&!o.commercialName)return;
    const key=clientKey(o);
    if(!key)return;
    let existing=state.clients.find(c=>clientKey(c)===key);
    if(existing){
      if(existing.companyId===companyId){
        // Existing CRM data wins, but empty fields can be completed from the CSV.
        existing.order=i+1;
        if(importAssigneeIds.length){
          const ids=new Set(existing.assignedUserIds||[]);
          importAssigneeIds.forEach(id=>ids.add(id));
          existing.assignedUserIds=[...ids];
        }
        if(!String(existing.population||'').trim()&&String(o.population||'').trim()){
          existing.population=String(o.population).trim();
          populationsCompleted++;
        }
        skipped++;
      }else{
        conflicts.push({incoming:o,existingId:existing.id});
      }
    }else{
      state.clients.push(o); added++;
    }
  });
  save(); render();
  let msg=`Importación finalizada\nAñadidos: ${added}\nYa existentes (sin modificar): ${skipped}\nSolapes con otra empresa: ${conflicts.length}`;
  $('#importResult').innerHTML=`<div class="import-summary">${esc(msg)}</div>`;
  if(conflicts.length)showConflicts(conflicts,companyId);
  else toast('Importación completada.');
}catch(e){$('#importResult').innerHTML=`<div class="import-summary danger-text">${esc(e.message||'No se ha podido importar el CSV. Revisa el formato del archivo.')}</div>`}}
function showConflicts(conflicts,targetCompany){

    return `<div class="card" data-conf="${i}">

      <div class="card-sub">Actualmente pertenece a: <b>${esc(company(ex.companyId).name)}</b>${ex.nif?' · '+esc(ex.nif):''}<br>Importación destino: <b>${esc(company(targetCompany).name)}</b></div>

    <div class="actions" style="margin-top:10px">

    <button class="btn full primary" onclick='applyConflicts(${JSON.stringify(conflicts).replace(/'/g,"&#39;")})'>${ICONS.check}<span>Aplicar decisiones</span></button>`);

function setConflictChoice(i,val){
  const wrap=$('#confChoice_'+i); if(!wrap)return; wrap.dataset.choice=val;

const FILLABLE_FIELDS=['fiscalName','commercialName','phone','fax','mobile','email','contact','nif','agent','type','address','population','province','zip'];
function applyConflicts(conflicts){
  conflicts.forEach((x,i)=>{
    const wrap=$('#confChoice_'+i);
    const decision=wrap?.dataset.choice||'keep';
    if(decision==='keep')return;
    if(decision==='duplicate'){
      state.clients.push({...x.incoming,id:uid(),createdAt:new Date().toISOString()});
      return;
    }
    if(decision==='move'){
      const ex=client(x.existingId);
      if(ex){
        ex.companyId=x.incoming.companyId;
        ex.order=x.incoming.order;
        if((x.incoming.assignedUserIds||[]).length)ex.assignedUserIds=[...new Set([...(ex.assignedUserIds||[]),...x.incoming.assignedUserIds])];
        FILLABLE_FIELDS.forEach(f=>{if(!ex[f]&&x.incoming[f])ex[f]=x.incoming[f]});
      }
    }
  });
  save();closeSheet();render();toast('Duplicados resueltos.');
}

function canModifyActivity(a){

function openFollowupFromActivity(parentId){
  if(!hasPermission('createVisits'))return toast('No tienes permiso para generar visitas.');
  const parent=state.activities.find(a=>a.id===parentId);
  if(!parent)return;
  const existing=state.activities.find(a=>a.parentId===parentId);
  if(existing){
    openActivity(existing.id);
    toast('Esta visita ya tiene un seguimiento vinculado.');
    return;
  }
  closeSheet();
  openActivity(null,parent.clientId);
  setTimeout(()=>{
    if($('#actCompany'))$('#actCompany').value=parent.companyId||'';
    if($('#actClient'))$('#actClient').value=parent.clientId||'';
    if($('#clientQuery'))$('#clientQuery').value=clientName(parent.clientId);

async function offerFollowupAfterDone(id){

function updateActivityStatus(id,status){
  const a=state.activities.find(x=>x.id===id);
