async function requestNotificationPermission(){
  if(!('Notification' in window))return showNotice('No disponible','Este navegador no admite notificaciones.');
  if(Notification.permission==='granted'){toast('Las notificaciones ya están activadas.');return true}
  const result=await Notification.requestPermission();
  if(result==='granted'){toast('Notificaciones activadas.');await runOperationalNotifications(true);return true}
  return showNotice('Permiso no concedido','Puedes activarlas desde los ajustes del navegador.');
}
async function showSystemNotification(title,body,tag='crm-mds'){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{
    if('serviceWorker' in navigator){
      const reg=await navigator.serviceWorker.ready;
      await reg.showNotification(title,{body,tag,icon:'./icons/icon-192.png',badge:'./icons/icon-192.png'});
    }else{
      new Notification(title,{body,tag});
    }
  }catch(error){console.warn('Notificación no mostrada',error)}
}
function operationalNotices(){
  if(!currentUser)return [];
  const notices=[];
  const myPending=visibleActivities().filter(a=>a.assignedUserId===currentUser.id&&a.status==='pending');
  const todayPending=myPending.filter(a=>a.date===today());
  const overdue=myPending.filter(a=>a.date&&a.date<today());
  const finalFlows=myPending.filter(a=>a.installationFlowId&&a.flowStage==='final_followup');
  if(finalFlows.length)notices.push({key:`final-installation-${finalFlows.map(a=>a.id).sort().join('-')}`,title:'Seguimiento final asignado',body:`Tienes ${finalFlows.length} seguimiento(s) final(es) de instalación pendiente(s).`,kind:'attention'});
  if(todayPending.length)notices.push({key:`pending-today-${today()}`,title:'Visitas pendientes hoy',body:`Tienes ${todayPending.length} visita(s) programada(s) para hoy.`,kind:'attention'});
  if(overdue.length)notices.push({key:`overdue-${today()}-${overdue.map(a=>a.id).sort().join('-')}`,title:'Visitas atrasadas',body:`Tienes ${overdue.length} visita(s) pendientes con fecha vencida.`,kind:'attention'});
  if(isAdmin()){
    const pendingOrders=state.orders.filter(o=>(o.status||'pending')==='pending');
    if(pendingOrders.length)notices.push({key:`orders-pending-${pendingOrders.map(o=>o.id).sort().join('-')}`,title:'Pedidos pendientes',body:`Hay ${pendingOrders.length} pedido(s) esperando revisión.`,kind:'attention'});
  }
  if((isAdmin()||hasPermission('viewCommissions'))){
    const unpaid=commissionsFor(currentUser.id).filter(c=>c.status!=='paid');
    const amount=unpaid.reduce((s,c)=>s+Number(c.amount||0),0);
    if(unpaid.length)notices.push({key:`commission-unpaid-${unpaid.map(c=>c.id+':'+c.status).sort().join('-')}`,title:'Comisiones pendientes de cobro',body:`Tienes ${unpaid.length} comisión(es) pendientes por ${euro(amount)}.`,kind:'positive'});
    const seen=getOperationalSeen();
    commissionsFor(currentUser.id).filter(c=>c.createdAt).forEach(c=>{
      const key=`commission-new-${c.id}`;
      if(!seen[key])notices.push({key,title:'Nueva comisión asignada',body:`${c.concept}: ${euro(c.amount)}.`,kind:'positive',single:true});
    });
  }
  return notices;
}
async function runOperationalNotifications(force=false){
  const notices=operationalNotices();
  const seen=getOperationalSeen();
  for(const n of notices){
    if(!force&&seen[n.key])continue;
    await showSystemNotification(n.title,n.body,n.key);
    markOperationalSeen(n.key);
  }
  updateNotificationDot();
}
function updateNotificationDot(){
  const unseen=operationalNotices().some(n=>!getOperationalSeen()[n.key]);
  $('#notificationDot')?.classList.toggle('show',unseen);

function openNotificationCenter(){

    </div>

  `);

async function pollCloudState(){

  try{

      .from('crm_workspace_states')

      .maybeSingle();
    if(error)throw error;
    if(data?.updated_at&&data.updated_at!==cloudUpdatedAt){
      cloudUpdatedAt=data.updated_at;
      if(data.data?.companies&&data.data?.clients&&data.data?.activities){
        state=normalizeState(data.data);
        localStorage.setItem(LS,JSON.stringify(state));
        render();
        setSyncStatus('Actualizado');
        await notifyNewAssignments();
        
      }
    }
  }catch(error){
    console.error('Error al actualizar desde la nube:',error);
  }finally{
    cloudPollBusy=false;
  }
}
function startCloudPolling(){
  clearInterval(cloudPollTimer);
  cloudPollTimer=setInterval(pollCloudState,12000);
  clearInterval(startCloudPolling._noticeTimer);startCloudPolling._noticeTimer=setInterval(runOperationalNotifications,60000);
}

function safeStorageName(name){
  return String(name||'documento.pdf').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]+/g,'-').replace(/-+/g,'-');
}
async function uploadCommissionPdf(commissionId,file){
  if(!file)return {path:'',name:''};
  if(file.type!=='application/pdf'&&!file.name.toLowerCase().endsWith('.pdf'))throw new Error('El documento debe ser un PDF.');
  if(file.size>10*1024*1024)throw new Error('El PDF no puede superar 10 MB.');
  const path=`${currentProfile.workspace_id}/${commissionId}/${Date.now()}-${safeStorageName(file.name)}`;
  const {error}=await supabaseClient.storage.from('commission-pdfs').upload(path,file,{contentType:'application/pdf',upsert:false});
  if(error)throw error;
  return {path,name:file.name};
}
async function saveCommission(commissionId=''){
  if(!isAdmin())return;
  const userId=$('#commissionUser').value;
  const amount=Number($('#commissionAmount').value);
  if(!userId)return toast('Selecciona un usuario.');
  if(!Number.isFinite(amount)||amount<=0)return toast('Introduce un importe válido.');
  const dateFrom=$('#commissionDateFrom').value||today();
  const dateTo=$('#commissionDateTo').value||dateFrom;
  if(dateTo<dateFrom)return toast('La fecha “hasta” no puede ser anterior a la fecha “desde”.');
  const button=$('#saveCommissionButton');
  if(button){button.disabled=true;button.querySelector('span').textContent='Guardando…'}
  const editing=commissionId?state.commissions.find(c=>c.id===commissionId):null;
  const id=editing?.id||uid();
  try{
    const file=$('#commissionPdf')?.files?.[0]||null;
    let pdfPath=editing?.pdfPath||'',pdfName=editing?.pdfName||'';
    if(file){
      const uploaded=await uploadCommissionPdf(id,file);
      if(editing?.pdfPath){
        const {error:removeError}=await supabaseClient.storage.from('commission-pdfs').remove([editing.pdfPath]);
        if(removeError)console.warn(removeError);
      }
      pdfPath=uploaded.path;pdfName=uploaded.name;
    }
    const data={
      id,userId,concept:$('#commissionConcept').value.trim()||'Comisión',amount,
      dateFrom,dateTo,status:$('#commissionStatus').value,notes:$('#commissionNotes').value.trim(),
      pdfPath,pdfName,createdAt:editing?.createdAt||new Date().toISOString(),
      createdBy:editing?.createdBy||currentUser.id,updatedAt:new Date().toISOString(),
      updatedBy:currentUser.id,paidAt:$('#commissionStatus').value==='paid'?(editing?.paidAt||new Date().toISOString()):''
    };
    if(editing)Object.assign(editing,data);else state.commissions.push(data);
    save();openCommissionsAdmin(userId);toast(editing?'Comisión actualizada.':'Comisión guardada.');
  }catch(error){
    console.error(error);
    toast(error.message||'No se pudo guardar el PDF.');
    if(button){button.disabled=false;button.querySelector('span').textContent='Guardar comisión'}
  }
}
async function openCommissionPdf(id){
  const c=state.commissions.find(x=>x.id===id);
  if(!c?.pdfPath)return toast('Esta comisión no tiene PDF.');
  if(!isAdmin()&&(c.userId!==currentUser?.id||!hasPermission('viewCommissions')))return toast('No tienes permiso para abrir este documento.');

async function deleteManagedUser(userId){
  if(!isAdmin())return;
  const target=teamMembers.find(m=>m.user_id===userId);
  if(!target)return;
  if(userId===currentUser?.id)return toast('No puedes eliminar tu propio usuario.');
  const ok=await showConfirm(
    'Eliminar usuario',
    `Se eliminará el acceso de ${target.display_name||target.email}. Sus visitas, pedidos y estadísticas históricas permanecerán guardados.`
  );
  if(!ok)return;
  try{
    await callUserAdmin({action:'delete_user',userId});
    if(state.permissions)delete state.permissions[userId];
    if(state.memberProfiles)delete state.memberProfiles[userId];
    state.companies.forEach(c=>c.assignedUserIds=(c.assignedUserIds||[]).filter(id=>id!==userId));
    state.clients.forEach(c=>c.assignedUserIds=(c.assignedUserIds||[]).filter(id=>id!==userId));
    save();
    await refreshTeamMembers();
    closeSheet();
    render();
    toast('Usuario eliminado.');
  }catch(error){
    console.error(error);
    toast(error.message||'No se pudo eliminar el usuario.');
  }
}

async function saveTeamAssignments(userId){
  if(!isAdmin()||!userId)return;
  const target=teamMembers.find(m=>m.user_id===userId);
  if(!target)return;
  const requestedRole=$('#teamRole')?.value||target.role;
  const requestedDisplayName=$('#teamDisplayName')?.value.trim()||target.display_name||target.email;
  try{
    if(requestedDisplayName!==target.display_name){
      await callUserAdmin({action:'update_user_name',userId,displayName:requestedDisplayName});
      target.display_name=requestedDisplayName;
    }
    if(requestedRole!==target.role){
      await callUserAdmin({action:'update_role',userId,role:requestedRole});
      target.role=requestedRole;
    }
    state.permissions=state.permissions||{};
    state.memberProfiles=state.memberProfiles||{};
    state.memberProfiles[userId]={...(state.memberProfiles[userId]||{}),phone:$('#teamPhone')?.value.trim()||''};
    if(requestedRole!=='admin'){
      state.permissions[userId]={
        createVisits:!!$('#permCreateVisits')?.checked,
        importShipmentExcel:!!$('#permImportShipmentExcel')?.checked,
        manageEquipmentInstallation:!!$('#permManageEquipmentInstallation')?.checked,
        addClients:!!$('#permAddClients')?.checked,
        editClients:!!$('#permEditClients')?.checked,
        deleteClients:!!$('#permDeleteClients')?.checked,
        deleteVisits:!!$('#permDeleteVisits')?.checked,
        viewCommissions:!!$('#permViewCommissions')?.checked,
        manageClientAlerts:!!$('#permManageClientAlerts')?.checked,
        exportClientHistory:!!$('#permExportClientHistory')?.checked,

        viewAllClients:!!$('#permViewAllClients')?.checked,
        viewAllVisits:!!$('#permViewAllVisits')?.checked,
        viewTeamStats:!!$('#permViewTeamStats')?.checked,
        viewAllOrders:!!$('#permViewAllOrders')?.checked
      };
    }else{
      delete state.permissions[userId];
    }
    state.companies.forEach(c=>{
      const checked=$(`[data-company-assignment="${c.id}"]`)?.checked;
      const ids=new Set(c.assignedUserIds||[]);
      checked?ids.add(userId):ids.delete(userId);
      c.assignedUserIds=[...ids];
    });
    state.clients.forEach(c=>{
      const checked=$(`[data-client-assignment="${c.id}"]`)?.checked;

      checked?ids.add(userId):ids.delete(userId);

    });
    save();

  }catch(error){
    console.error(error);toast(error.message||'No se pudo guardar el usuario.');
  }
}

function commercialStats(member){
  const acts=state.activities.filter(a=>a.assignedUserId===member.user_id);
  const done=acts.filter(a=>a.status==='done');
  const pending=acts.filter(a=>a.status==='pending');
  const cancelled=acts.filter(a=>a.status==='cancelled');
  const overdue=pending.filter(a=>a.date&&a.date<today());
  const todayActs=acts.filter(a=>a.date===today());
  const first=acts.filter(a=>a.type==='first');
  const followup=acts.filter(a=>a.type==='followup');
  const clients=new Set(acts.map(a=>a.clientId).filter(Boolean));
  const companies=new Set(acts.map(a=>a.companyId).filter(Boolean));
  const now=new Date();
  const monthPrefix=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthDone=done.filter(a=>(a.date||'').startsWith(monthPrefix));
  const completion=acts.length?Math.round(done.length*100/acts.length):0;
  const punctuality=(done.length+overdue.length)?Math.max(0,Math.round(done.length*100/(done.length+overdue.length))):100;
  const cancellationRate=acts.length?Math.round(cancelled.length*100/acts.length):0;
  const orders=ordersForCommercial(member.user_id);
  const acceptedOrders=orders.filter(o=>o.status==='accepted');
  const pendingOrders=orders.filter(o=>(o.status||'pending')==='pending');
  const rejectedOrders=orders.filter(o=>o.status==='rejected');
  const orderNumbers=acceptedOrders.map(o=>o.orderNumber).filter(Boolean);
  const productivity=Math.max(0,Math.min(100,Math.round(completion*.55+punctuality*.30+Math.max(0,100-cancellationRate)*.15)));
  const last6=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const prefix=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    last6.push({label:d.toLocaleDateString('es-ES',{month:'short'}).replace('.',''),value:done.filter(a=>(a.date||'').startsWith(prefix)).length});
  }
  return {acts:acts.length,done:done.length,pending:pending.length,cancelled:cancelled.length,overdue:overdue.length,today:todayActs.length,first:first.length,followup:followup.length,clients:clients.size,companies:companies.size,monthDone:monthDone.length,completion,punctuality,cancellationRate,productivity,last6,orders:orders.length,acceptedOrders:acceptedOrders.length,pendingOrders:pendingOrders.length,rejectedOrders:rejectedOrders.length,orderNumbers,orderTotal:orders.reduce((s,o)=>s+Number(o.total||0),0),all:acts};
}
function openCommercialStats(){
  if(!hasPermission('viewTeamStats'))return toast('No tienes permiso para ver el rendimiento del equipo.');
  const ranked=assignableMembers().map(m=>({member:m,stats:commercialStats(m)})).sort((a,b)=>b.stats.productivity-a.stats.productivity);
  const totalVisits=ranked.reduce((s,x)=>s+x.stats.acts,0);
  const totalOrders=ranked.reduce((s,x)=>s+x.stats.orders,0);
  const average=ranked.length?Math.round(ranked.reduce((s,x)=>s+x.stats.productivity,0)/ranked.length):0;
  const maxScore=Math.max(1,...ranked.map(x=>x.stats.productivity));
  const cardsHtml=ranked.map(({member:m,stats:s})=>`<div class="card commercial-stat-card" onclick="openCommercialDetail('${m.user_id}')"><div class="row"><div><div class="card-title">${esc(m.display_name||m.email)} ${m.role==='admin'?'<span class="role-badge admin">Admin</span>':m.role==='supervisor'?'<span class="role-badge supervisor">Supervisor</span>':''}</div><div class="card-sub">${esc(m.email||'')}</div></div><span class="stat-chevron">${ICONS.chevron}</span></div><div class="stat-mini-grid"><div class="stat-mini"><b>${s.productivity}</b><span>Productividad</span></div><div class="stat-mini"><b>${s.acts}</b><span>Visitas</span></div><div class="stat-mini"><b>${s.orders}</b><span>Pedidos</span></div></div>${s.orderNumbers.length?`<div class="order-number-list">${s.orderNumbers.slice(0,6).map(n=>`<span class="order-number-pill">${esc(n)}</span>`).join('')}</div>`:''}</div>`).join('');
  openSheet('Productividad del equipo','Comparativa real por comercial',`
    <div class="grid2"><div class="stat"><b>${average}</b><span>Productividad media</span></div><div class="stat"><b>${totalVisits}</b><span>Visitas totales</span></div><div class="stat"><b>${totalOrders}</b><span>Pedidos totales</span></div><div class="stat"><b>${ranked.length}</b><span>Usuarios medidos</span></div></div>
    <div class="chart-card"><div class="chart-title">Productividad real comparada</div><div class="productivity-comparison">${ranked.map(({member,stats})=>`<div class="productivity-comparison-row"><div class="productivity-comparison-name">${esc(member.display_name||member.email)}</div><div class="productivity-comparison-track"><div class="productivity-comparison-fill" style="width:${Math.max(2,Math.round(stats.productivity/maxScore*100))}%"></div></div><div class="productivity-comparison-value">${stats.productivity}</div></div>`).join('')}</div><div class="small" style="margin-top:12px">Combina visitas realizadas, cumplimiento, puntualidad y cancelaciones.</div></div>
    <div class="section-title">Detalle por usuario</div><div class="list">${cardsHtml}</div>`);
}

async function initApp(){
  const form=$('#authForm');
  form.addEventListener('submit',signInUser);
  const cfg=window.CRM_MDS_CONFIG||{};
  const configMissing=!cfg.supabaseUrl||!cfg.supabaseAnonKey||cfg.supabaseUrl.includes('TU-PROYECTO')||cfg.supabaseAnonKey.includes('TU_CLAVE');
  if(configMissing){
    $('#authConfigHelp').innerHTML='<b>Aplicación sin configurar.</b><br>Abre <b>config.js</b> y sustituye TU-PROYECTO y TU_CLAVE_PUBLICA_ANON por los datos reales de Supabase.';
    $('#authError').textContent='No se puede iniciar sesión hasta configurar la conexión con Supabase.';
    return;
  }
  if(!window.supabase?.createClient){
    $('#authError').textContent='No se ha podido cargar la librería de Supabase. Comprueba la conexión a Internet y recarga la página.';
    return;
  }
  try{
    supabaseClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    const {data:{session},error}=await supabaseClient.auth.getSession();
    if(error)throw error;
    if(session?.user)await enterApp(session.user);
    supabaseClient.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_OUT'){currentUser=null;cloudReady=false;$('#authScreen').classList.remove('hidden');}
    });
  }catch(error){
    console.error(error);
    $('#authError').textContent='No se ha podido conectar con Supabase. Revisa la URL y la clave pública de config.js.';
  }
}
async function signInUser(e){
  e.preventDefault();
  $('#authError').textContent='';
  if(!supabaseClient){
    $('#authError').textContent='La aplicación no está conectada con Supabase. Revisa config.js.';
    return;
  }
  const email=$('#authEmail').value.trim(),password=$('#authPassword').value;
  const button=$('#authForm button');
  button.disabled=true; button.querySelector('span').textContent='Entrando…';
  try{
    const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});
    if(error)throw error;
    if(!data?.user)throw new Error('Supabase no devolvió un usuario válido.');
    await enterApp(data.user);
  }catch(error){
    console.error(error);
    $('#authError').textContent=error?.message||'No se ha podido iniciar sesión. Revisa el correo y la contraseña.';
  }finally{
    button.disabled=false; button.querySelector('span').textContent='Entrar';
  }
}
async function enterApp(user){
  currentUser=user; setSyncStatus('Cargando');
  const {data:profile,error:profileError}=await supabaseClient.from('crm_members').select('user_id,workspace_id,role,display_name,email').eq('user_id',user.id).maybeSingle();
  if(profileError||!profile){
    $('#authError').textContent='Tu usuario no pertenece todavía al equipo CRM. Ejecuta el nuevo esquema SQL o pide al administrador que active tu cuenta.';
    console.error(profileError);return;
  }
  currentProfile=profile;
  const {data:members,error:membersError}=await supabaseClient.from('crm_members').select('user_id,workspace_id,role,display_name,email').eq('workspace_id',profile.workspace_id).order('display_name');
  if(membersError){$('#authError').textContent='No se ha podido cargar el equipo.';console.error(membersError);return;}
  teamMembers=members||[];
  const {data,error}=await supabaseClient.from('crm_workspace_states').select('data,updated_at').eq('workspace_id',profile.workspace_id).maybeSingle();
  if(error){$('#authError').textContent='No se han podido cargar los datos compartidos.';console.error(error);return;}
  if(data?.data&&data.data.companies&&data.data.clients&&data.data.activities){
    cloudUpdatedAt=data.updated_at||'';
    state=normalizeState(data.data);localStorage.setItem(LS,JSON.stringify(state));
  }else{
    // Primera puesta en marcha: el administrador migra los datos locales existentes.
    state=isAdmin()?loadLocal():DEFAULT_STATE();
    cloudReady=true;
    await saveCloudState();
  }
  cloudReady=true; $('#authScreen').classList.add('hidden'); render(); setSyncStatus('Guardado'); startCloudPolling(); setTimeout(async()=>{await notifyNewAssignments();await runOperationalNotifications();updateNotificationDot();},500);
}

function openMyProfile(){
  if(!currentUser||!currentProfile)return;
  openSheet('Mi perfil','Cambiar nombre visible',`
    <div class="field"><label>Nombre visible</label><input id="profileDisplayName" value="${esc(currentProfile.display_name||'')}" autocomplete="name"></div>
    <div class="field"><label>Correo de acceso</label><input value="${esc(currentUser.email||'')}" disabled></div>
    <div class="small">El nombre actualizado aparecerá en visitas, pedidos, estadísticas y asignaciones.</div>
    <button class="btn full primary" id="saveProfileButton" onclick="saveMyProfile()">${ICONS.check}<span>Guardar nombre</span></button>
    <div id="profileUpdateResult"></div>
  `);

async function saveMyProfile(){
  const displayName=$('#profileDisplayName')?.value.trim()||'';
  if(!displayName)return toast('Introduce un nombre.');
  const button=$('#saveProfileButton');
  if(button){button.disabled=true;button.querySelector('span').textContent='Guardando…'}
  try{
    await callUserAdmin({action:'update_self_profile',displayName});
    currentProfile.display_name=displayName;
    const member=teamMembers.find(m=>m.user_id===currentUser.id);
    if(member)member.display_name=displayName;
    await supabaseClient.auth.updateUser({data:{display_name:displayName}});
    render();
    if($('#profileUpdateResult'))$('#profileUpdateResult').innerHTML='<div class="profile-success">Nombre actualizado correctamente.</div>';
    toast('Nombre actualizado.');
  }catch(error){
    console.error(error);
    toast(error.message||'No se pudo actualizar el nombre.');
  }finally{
    if(button){button.disabled=false;button.querySelector('span').textContent='Guardar nombre'}
  }
}
function openChangePassword(){
  openSheet('Cambiar contraseña','Seguridad de la cuenta',`
    <div class="field"><label>Nueva contraseña</label><input id="newOwnPassword" type="password" minlength="8" autocomplete="new-password"></div>
    <div class="field"><label>Repetir nueva contraseña</label><input id="confirmOwnPassword" type="password" minlength="8" autocomplete="new-password"></div>
    <div class="password-strength-note">La contraseña debe tener al menos 8 caracteres. No se enviará ningún correo electrónico.</div>
    <button class="btn full primary" id="changeOwnPasswordButton" onclick="changeOwnPassword()">${ICONS.check}<span>Guardar contraseña</span></button>
  `);
}
async function changeOwnPassword(){
  const password=$('#newOwnPassword')?.value||'';
  const confirmation=$('#confirmOwnPassword')?.value||'';
  if(password.length<8)return toast('La contraseña debe tener al menos 8 caracteres.');
  if(password!==confirmation)return toast('Las contraseñas no coinciden.');
  const button=$('#changeOwnPasswordButton');
  if(button){button.disabled=true;button.querySelector('span').textContent='Guardando…'}
  try{
    const {error}=await supabaseClient.auth.updateUser({password});
    if(error)throw error;
    closeSheet();
    toast('Contraseña actualizada correctamente.');
  }catch(error){
    console.error(error);
    toast(error.message||'No se pudo cambiar la contraseña.');
  }finally{
    if(button){button.disabled=false;button.querySelector('span').textContent='Guardar contraseña'}
  }
}

async function signOutUser(){if(!supabaseClient)return;await saveCloudState();await supabaseClient.auth.signOut();location.reload();}

let deferredInstallPrompt=null;
const isStandalone=()=>window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
function updateOnlineState(){
  const pill=$('#offlinePill');
  if(pill)pill.classList.toggle('show',!navigator.onLine);
}
function updatePwaSettings(){
  const text=$('#pwaSettingsText'),button=$('#pwaSettingsButton');
  if(!text||!button)return;
  if(isStandalone()){
    text.textContent='CRM MDS ya está instalada en este dispositivo.';
    button.classList.add('hidden');
  }else if(isIOS()){
    text.textContent='En Safari, pulsa Compartir y después “Añadir a pantalla de inicio”.';
    button.querySelector('span').textContent='Ver instrucciones';
    button.classList.remove('hidden');
  }else{
    text.textContent='Instala CRM MDS para abrirla a pantalla completa desde el icono del móvil.';
    button.querySelector('span').textContent='Instalar aplicación';
    button.classList.remove('hidden');
  }
}
function showInstallBanner(){
  if(isStandalone()||localStorage.getItem('crm_mds_install_dismissed')==='1')return;
  const banner=$('#installBanner'),copy=$('#installCopy'),button=$('#installNow');
  if(!banner)return;
  if(isIOS()){
    copy.textContent='En Safari: pulsa Compartir y “Añadir a pantalla de inicio”.';
    button.textContent='Cómo hacerlo';
  }else if(!deferredInstallPrompt){
    return;
  }
  banner.classList.add('show');
}
async function requestAppInstall(){
  if(isStandalone()){toast('La aplicación ya está instalada.');return;}
  if(isIOS()){
    await showNotice('Instalar en iPhone o iPad','Abre esta web en Safari, pulsa el botón Compartir y elige “Añadir a pantalla de inicio”.');
    return;
  }
  if(!deferredInstallPrompt){
    toast('Abre el menú del navegador y selecciona “Instalar aplicación” o “Añadir a pantalla de inicio”.');
    return;
  }
  deferredInstallPrompt.prompt();
  const result=await deferredInstallPrompt.userChoice;
  if(result.outcome==='accepted')toast('Aplicación instalada.');
  deferredInstallPrompt=null;
  $('#installBanner')?.classList.remove('show');
  updatePwaSettings();
}
window.addEventListener('beforeinstallprompt',event=>{
  event.preventDefault();
  deferredInstallPrompt=event;
  setTimeout(showInstallBanner,1200);
  updatePwaSettings();
});
window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  $('#installBanner')?.classList.remove('show');
  localStorage.removeItem('crm_mds_install_dismissed');
  updatePwaSettings();
  toast('CRM MDS instalada correctamente.');
});
window.addEventListener('online',updateOnlineState);
window.addEventListener('offline',updateOnlineState);
$('#installNow')?.addEventListener('click',requestAppInstall);
$('#installClose')?.addEventListener('click',()=>{
  $('#installBanner')?.classList.remove('show');
  localStorage.setItem('crm_mds_install_dismissed','1');
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
updateOnlineState();
setTimeout(()=>{if(isIOS())showInstallBanner();updatePwaSettings();},1400);

initApp();
</script>
