<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15150F">
<meta name="application-name" content="CRM MDS">
<meta name="description" content="CRM comercial de Grupo MDS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CRM MDS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<title>CRM MDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F5F1; --surface:#FFFFFF; --surface-2:#FAF9F6;
  --ink:#15150F; --ink-2:#5B5B52; --ink-3:#9C9B8F;
  --line:#E7E4DA; --line-soft:#F0EEE6;
  --accent:#1F5FA6; --accent-ink:#FFFFFF; --accent-soft:#EAF1FA;
  --amber:#94620B; --amber-soft:#FBF2E1;
  --green:#1C6B41; --green-soft:#E9F5EE;
  --red:#B23A2C; --red-soft:#FBECE8;
  --radius-lg:16px; --radius-md:12px; --radius-sm:10px;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif; --mono:'DM Mono',ui-monospace,monospace;
  --shadow-card:0 1px 2px rgba(21,21,15,.04);
  --shadow-float:0 14px 40px rgba(21,21,15,.12);
  --shadow-sheet:0 -20px 60px rgba(21,21,15,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--ink);color:var(--ink);height:100dvh;overflow:hidden;display:flex;justify-content:center;padding:0;touch-action:manipulation}
@media(display-mode:standalone){body{user-select:none;-webkit-user-select:none}}
button,input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

.app{width:100%;max-width:430px;height:100dvh;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(21,21,15,.10)}
@media(max-width:600px){.app{max-width:none;box-shadow:none}}

.header{height:calc(58px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);background:var(--surface);position:relative;flex:0 0 auto}
.header-title{font-family:var(--mono);font-size:11px;letter-spacing:2.4px;text-transform:uppercase;font-weight:500;color:var(--ink)}
.logo{position:absolute;left:14px;height:30px;width:auto;object-fit:contain}
.top-action{position:absolute;right:12px;background:var(--ink);color:#fff;border:0;border-radius:10px;padding:9px 13px;font-family:var(--mono);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.top-action svg{width:12px;height:12px}
.top-action:active{opacity:.8}

.content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:16px 16px calc(100px + env(safe-area-inset-bottom));background:var(--surface)}
.view{display:none;animation:fade .18s ease}
.view.active{display:block}
@keyframes fade{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:none}}

.nav{position:absolute;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:20px;display:flex;align-items:center;justify-content:space-around;box-shadow:var(--shadow-float);z-index:50}
.nav button{background:none;border:0;color:var(--ink-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:14px;flex:1;height:48px;transition:background .15s,color .15s}
.nav button svg{width:18px;height:18px}
.nav button span{font-family:var(--mono);font-size:7.5px;letter-spacing:.8px;text-transform:uppercase}
.nav button.active{background:var(--ink);color:#fff}

.section-title{font-family:var(--mono);font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px}
.list-count{font-family:var(--mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin:0 0 10px}

.hero{background:var(--ink);color:#fff;border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero:after{content:'';position:absolute;right:-30px;top:-38px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:10px}
.hero-num{font-family:var(--mono);font-size:34px;font-weight:500;line-height:1}
.hero-note{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);margin-top:6px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;background:var(--surface)}
.stat b{display:block;font-family:var(--mono);font-size:21px;font-weight:500;margin-bottom:4px}
.stat span{font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}

.disclosure{margin-bottom:10px}
.disclosure-head{width:100%;display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-md);padding:14px 14px;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-card)}
.disclosure-head span:first-child{flex:1;text-align:left}
.disclosure-count{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);background:var(--bg);border-radius:999px;padding:3px 9px}
.disclosure-head svg{width:15px;height:15px;color:var(--ink-3);transition:transform .18s ease;flex:0 0 auto}
.disclosure-head.open svg{transform:rotate(90deg)}
.disclosure .list{margin-top:8px}

.card{border:1px solid var(--line);border-radius:var(--radius-md);background:var(--surface);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-card)}
.card.click{cursor:pointer;transition:transform .12s ease}
.card.click:active{transform:scale(.985)}
.card-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;margin-bottom:5px}
.card-title{font-size:15px;font-weight:700;line-height:1.2;margin-bottom:3px}
.card-sub{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);line-height:1.5}
.row{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.card-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
.card-side svg{width:14px;height:14px;color:var(--ink-3)}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-family:var(--mono);font-size:8px;color:var(--ink-2);background:var(--bg);display:inline-flex;align-items:center;gap:4px}
.chip svg{width:10px;height:10px}

.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;padding:4px 8px;border-radius:999px;white-space:nowrap}
.badge-pending{background:var(--amber-soft);color:var(--amber)}
.badge-done{background:var(--green-soft);color:var(--green)}
.badge-cancelled{background:var(--red-soft);color:var(--red)}
.imp-low{background:var(--bg);color:var(--ink-3);border:1px solid var(--line)}
.imp-mid{background:var(--accent-soft);color:var(--accent)}
.imp-high{background:var(--amber-soft);color:var(--amber)}
.imp-top{background:var(--red-soft);color:var(--red)}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex:0 0 auto}

.search-bar{position:relative;margin-bottom:12px}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-3)}
.search-bar input{padding-left:36px}
.field input,.field select,.field textarea,.search-bar input{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 12px;font-size:14px;background:var(--surface-2);color:var(--ink);font-family:var(--sans)}
.field textarea{min-height:86px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus,.search-bar input:focus{outline:none;border-color:var(--ink);background:#fff}
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:6px}

.filter-toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:9px 13px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);margin-bottom:10px}
.filter-toggle svg{width:13px;height:13px}
.filter-active-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:var(--radius-sm);padding:11px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none}
.btn svg{width:14px;height:14px;flex:0 0 auto}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.blue{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.warn{background:var(--amber-soft);color:var(--amber);border-color:rgba(148,98,11,.28)}
.btn.danger{background:var(--red-soft);color:var(--red);border-color:rgba(178,58,44,.3)}
.btn.full{width:100%;margin-bottom:8px}
.btn:active{transform:scale(.985)}

.icon-btn{width:36px;height:36px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.icon-btn svg{width:15px;height:15px}

.list{display:flex;flex-direction:column;gap:10px}
.empty-state{border:1px dashed var(--line);border-radius:var(--radius-md);background:var(--bg);padding:38px 20px;text-align:center;color:var(--ink-3)}
.empty-state svg{width:26px;height:26px;margin-bottom:10px;color:var(--ink-3)}
.empty-title{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink-2);margin-bottom:4px}
.empty-sub{font-family:var(--mono);font-size:10px;line-height:1.6;max-width:240px;margin:0 auto}

.calendar-head{display:grid;grid-template-columns:36px 1fr 36px;gap:8px;align-items:center;margin-bottom:12px}
.calendar-title{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase}
.cal{border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden;background:var(--surface)}
.cal-week,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-week div{font-family:var(--mono);font-size:8px;color:var(--ink-3);text-align:center;padding:9px 0;background:var(--surface-2);text-transform:uppercase}
.day{min-height:58px;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:6px;position:relative;cursor:pointer}
.day:nth-child(7n){border-right:0}
.day-num{font-family:var(--mono);font-size:10px;color:var(--ink-2)}
.day.out .day-num{color:var(--line)}
.day.today{background:var(--accent-soft)}
.day.today .day-num{color:var(--accent);font-weight:500}
.points{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.point{width:7px;height:7px;border-radius:50%}

.sheet{position:fixed;inset:0;background:rgba(21,21,15,.42);display:none;align-items:flex-end;justify-content:center;z-index:100}
.sheet.show{display:flex}
.panel{width:100%;max-width:430px;max-height:calc(92dvh - env(safe-area-inset-top));background:var(--surface);border-radius:22px 22px 0 0;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-sheet)}
.panel-body{padding-bottom:calc(26px + env(safe-area-inset-bottom))!important}
.panel-head{padding:17px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.panel-title{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase}
.panel-sub{font-size:12px;color:var(--ink-2);margin-top:4px}
.panel-body{padding:16px 18px 26px;overflow:auto}
.close{border:1px solid var(--line);background:var(--surface-2);width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.close svg{width:14px;height:14px}

.confirm-overlay{position:fixed;inset:0;background:rgba(21,21,15,.46);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.confirm-overlay.show{display:flex}
.confirm-box{width:100%;max-width:336px;background:var(--surface);border-radius:var(--radius-lg);padding:20px;box-shadow:0 24px 60px rgba(21,21,15,.28)}
.confirm-title{display:flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:700;font-size:14.5px;margin-bottom:10px}
.confirm-title svg{width:18px;height:18px;color:var(--amber);flex:0 0 auto}
.confirm-body{font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:18px}

.toast{position:fixed;left:50%;bottom:92px;transform:translate(-50%,10px);background:var(--ink);color:#fff;font-family:var(--sans);font-size:12.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:0 14px 34px rgba(21,21,15,.3);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:300;max-width:84%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,0)}

.client-picker-list{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;margin-top:6px}
.pick-item{padding:11px;border-bottom:1px solid var(--line);cursor:pointer}
.pick-item:last-child{border-bottom:0}
.pick-item:active{background:var(--surface-2)}
.import-summary{font-family:var(--mono);font-size:10px;line-height:1.7;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;margin-top:8px;white-space:pre-wrap}
.settings-group{margin-bottom:20px}
.settings-group .btn{margin-bottom:8px}
.settings-card-title{display:flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:600;font-size:13px}
.settings-card-title svg{width:16px;height:16px;color:var(--ink-3)}

.info-grid{display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;font-size:12.5px}
.info-row span{font-family:var(--mono);font-size:9px;letter-spacing:.9px;text-transform:uppercase;color:var(--ink-3);flex:0 0 auto;padding-top:2px}
.info-row b{font-weight:600;text-align:right;color:var(--ink)}

.hidden{display:none!important}
.mono{font-family:var(--mono)}
.small{font-size:12.5px;color:var(--ink-2);line-height:1.55}
.danger-text{color:var(--red)}
.field-error{border-color:var(--red)!important;background:var(--red-soft)!important}
.conflict-choice{display:flex;gap:6px;margin-top:10px}
.conflict-opt{flex:1;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2);border-radius:var(--radius-sm);padding:9px 6px;font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer}
.conflict-opt.active{background:var(--ink);color:#fff;border-color:var(--ink)}


.auth-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom))}
.auth-screen.hidden{display:none!important}
.auth-card{width:100%;max-width:390px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow-float)}
.auth-brand{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.auth-title{font-size:24px;font-weight:700;line-height:1.15;margin-bottom:8px}
.auth-note{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:20px}
.auth-error{min-height:20px;color:var(--red);font-size:12px;margin:4px 0 8px}
.sync-pill{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-3);display:none}
.sync-pill.show{display:block}
.sync-pill.error{color:var(--red)}
.user-card{font-size:12px;color:var(--ink-2);word-break:break-word}
@media(max-width:370px){
  .content{padding-left:12px;padding-right:12px}
  .grid2,.actions{grid-template-columns:1fr}
  .nav{left:8px;right:8px}
  .nav button span{font-size:7px}
  .day{min-height:50px}
  .hero-num{font-size:29px}
}

.install-banner{position:fixed;z-index:900;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translate(-50%,18px);width:min(calc(100% - 24px),406px);background:var(--ink);color:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow-float);display:none;align-items:center;gap:12px;opacity:0;transition:.2s ease}
.install-banner.show{display:flex;opacity:1;transform:translate(-50%,0)}
.install-icon{width:42px;height:42px;border-radius:12px;flex:0 0 auto}
.install-copy{min-width:0;flex:1}
.install-copy b{display:block;font-size:13px;margin-bottom:2px}
.install-copy span{display:block;font-family:var(--mono);font-size:8.5px;line-height:1.45;color:rgba(255,255,255,.65)}
.install-actions{display:flex;gap:6px;align-items:center}
.install-actions button{border:0;border-radius:9px;padding:9px 10px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase}
.install-now{background:#fff;color:var(--ink)}
.install-close{background:rgba(255,255,255,.12);color:#fff;width:34px;padding:9px 0!important}
.offline-pill{position:fixed;left:50%;top:calc(8px + env(safe-area-inset-top));transform:translateX(-50%);z-index:1200;background:var(--amber-soft);color:var(--amber);border:1px solid rgba(148,98,11,.25);border-radius:999px;padding:6px 10px;font-family:var(--mono);font-size:8px;letter-spacing:.7px;text-transform:uppercase;display:none}
.offline-pill.show{display:block}
@media(display-mode:standalone){.install-banner{display:none!important}}

</style>
</head>
<body>
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">CRM MDS</div>
    <div class="auth-title">Acceso seguro</div>
    <div class="auth-note">Entra con tu correo y contraseña. Los datos se guardarán en la nube y estarán disponibles desde cualquier dispositivo.</div>
    <form id="authForm">
      <div class="field"><label>Correo electrónico</label><input id="authEmail" type="email" autocomplete="username" required></div>
      <div class="field"><label>Contraseña</label><input id="authPassword" type="password" autocomplete="current-password" required></div>
      <div class="auth-error" id="authError"></div>
      <button class="btn full primary" type="submit"><span>Entrar</span></button>
    </form>
    <div class="small" id="authConfigHelp" style="margin-top:12px"></div>
  </div>
</div>
<div class="app">
  <div class="header">
    <img class="logo" src="https://www.matriculadosdelsur.com/wp-content/uploads/2025/10/grupomds-e1705059389337-125x97.png" onerror="this.style.display='none'">
    <div class="header-title">CRM MDS</div><div class="sync-pill" id="syncPill">Sincronizando</div>
    <button class="top-action" onclick="openActivity()" id="topActionBtn"></button>
  </div>
  <main class="content" id="content">
    <section id="view-inicio" class="view active"></section>
    <section id="view-clientes" class="view"></section>
    <section id="view-agenda" class="view"></section>
    <section id="view-calendario" class="view"></section>
    <section id="view-historial" class="view"></section>
    <section id="view-ajustes" class="view"></section>
  </main>
  <nav class="nav" id="nav"></nav>
</div>
<div class="sheet" id="sheet"><div class="panel"><div class="panel-head"><div><div class="panel-title" id="sheetTitle"></div><div class="panel-sub" id="sheetSub"></div></div><button class="close" id="sheetCloseBtn"></button></div><div class="panel-body" id="sheetBody"></div></div></div>
<div class="confirm-overlay" id="confirmOverlay"><div class="confirm-box"><div class="confirm-title" id="confirmTitle"></div><div class="confirm-body" id="confirmBody"></div><div id="confirmActions"></div></div></div>
<div class="toast" id="toast"></div>

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let activeView='inicio', calDate=new Date(), selectedCompany='all', activityEditId=null;

 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',

 filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg>',
 pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.1 7-11.5A7 7 0 0 0 5 9.5C5 14.9 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.3"/></svg>',

 mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5.5" width="17" height="13" rx="2"/><path d="M4 6.5l8 6.5 8-6.5"/></svg>',
 whatsapp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18l-1.4 3 3-1.3a8 8 0 1 0-3.4-3.4z"/><path d="M9 10c0 3 2.5 5.5 5.5 5.5.6-.9.5-1.3.2-1.6l-1.5-1c-.3-.2-.6-.1-.8.1l-.4.5c-.9-.4-1.9-1.4-2.3-2.3l.5-.4c.2-.2.3-.5.1-.8l-1-1.5c-.3-.3-.7-.4-1.6.2z"/></svg>',
 map:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6.5v13L9 17l6 3 6-2.5v-13L15 7z"/><path d="M9 4v13M15 7v13"/></svg>',
 edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l.9-3.6L16 5.3a1.7 1.7 0 0 1 2.4 0l1.3 1.3a1.7 1.7 0 0 1 0 2.4L8.6 20 4 20z"/><path d="M14.5 6.8l2.7 2.7"/></svg>',
 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>',

 inbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h4.5l1.5 3h4l1.5-3H20"/><path d="M4 12 5.7 5.4A1.5 1.5 0 0 1 7.1 4h9.8a1.5 1.5 0 0 1 1.4 1.4L20 12v6a1.6 1.6 0 0 1-1.6 1.6H5.6A1.6 1.6 0 0 1 4 18z"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>'
};
const NAV_ITEMS=[['inicio','home','Inicio'],['clientes','users','Clientes'],['agenda','agenda','Agenda'],['calendario','calendar','Calendario'],['historial','history','Historial'],['ajustes','settings','Ajustes']];

const DEFAULT_STATE=()=>({settings:{commercial:'',inactiveDays:90},companies:[{id:uid(),name:'Grupo MDS',color:'#1C6FB8'}],clients:[],activities:[]});
let state=loadLocal(), supabaseClient=null, currentUser=null, cloudSaveTimer=null, cloudReady=false;
function loadLocal(){try{const d=JSON.parse(localStorage.getItem(LS)); if(d&&d.companies&&d.clients&&d.activities) return d;}catch(e){} return DEFAULT_STATE();}
function save(){
  localStorage.setItem(LS,JSON.stringify(state));
  if(!cloudReady||!currentUser||!supabaseClient)return;
  setSyncStatus('Sincronizando');
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer=setTimeout(saveCloudState,450);
}
async function saveCloudState(){
  if(!cloudReady||!currentUser||!supabaseClient)return;
  const {error}=await supabaseClient.from('crm_states').upsert({user_id:currentUser.id,data:state,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  if(error){setSyncStatus('Error de sincronización',true); console.error(error); return;}
  setSyncStatus('Guardado');
}
function setSyncStatus(text,isError=false){const el=$('#syncPill'); if(!el)return; el.textContent=text; el.classList.add('show'); el.classList.toggle('error',isError); clearTimeout(setSyncStatus._t); if(!isError)setSyncStatus._t=setTimeout(()=>el.classList.remove('show'),1600);}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function fmtDate(d){if(!d)return ''; const [y,m,day]=String(d).split('-'); return day?`${day}/${m}/${y}`:'';}
function today(){return new Date().toISOString().slice(0,10)}
function company(id){return state.companies.find(c=>c.id===id)||{name:'Sin empresa',color:'#999990'};}
function client(id){return state.clients.find(c=>c.id===id);}
function clientName(id){const c=client(id);return c?(c.fiscalName||c.commercialName||'Cliente sin nombre'):'Cliente eliminado'}
function activityChildren(id){return state.activities.filter(a=>a.parentId===id)}
function hasFirst(clientId){return state.activities.some(a=>a.clientId===clientId&&a.type==='first')}
function lastContact(clientId){const arr=state.activities.filter(a=>a.clientId===clientId&&a.status==='done'&&a.date).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));return arr[0]?.date||''}
function canBeParent(a, editingId){return a.status==='done' && !state.activities.some(x=>x.parentId===a.id && x.id!==editingId)}
function matchesClient(c,q){q=norm(q); if(!q)return true; return Object.values(c).some(v=>norm(v).includes(q));}
function norm(s){return String(s??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

/* ---------- Feedback: toast + confirm dialog (replace native alert/confirm) ---------- */
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2800);
}
function showNotice(title,msg){
  return new Promise(res=>{
    $('#confirmTitle').innerHTML=`${ICONS.alertTri}<span>${esc(title)}</span>`;
    $('#confirmBody').textContent=msg;
    $('#confirmActions').innerHTML=`<button class="btn primary full" id="confirmOk">Entendido</button>`;
    $('#confirmOverlay').classList.add('show');
    $('#confirmOk').onclick=()=>{$('#confirmOverlay').classList.remove('show'); res(true);};
  });
}
function showConfirm(title,msg){
  return new Promise(res=>{
    $('#confirmTitle').innerHTML=`${ICONS.alertTri}<span>${esc(title)}</span>`;
    $('#confirmBody').textContent=msg;
    $('#confirmActions').innerHTML=`<div class="actions" style="margin-top:0"><button class="btn" id="confirmCancel">Cancelar</button><button class="btn danger" id="confirmYes">Confirmar</button></div>`;
    $('#confirmOverlay').classList.add('show');
    const close=v=>{$('#confirmOverlay').classList.remove('show'); res(v);};
    $('#confirmCancel').onclick=()=>close(false);
    $('#confirmYes').onclick=()=>close(true);
  });
}

/* ---------- Static chrome ---------- */
$('#topActionBtn').innerHTML=`${ICONS.plus}<span>Nueva</span>`;
$('#topActionBtn').addEventListener('click',()=>openActivity());
$('#sheetCloseBtn').innerHTML=ICONS.close;
$('#sheetCloseBtn').addEventListener('click',closeSheet);
$('#nav').innerHTML=NAV_ITEMS.map(([v,icon,label],i)=>`<button data-view="${v}" class="${i===0?'active':''}">${ICONS[icon]}<span>${label}</span></button>`).join('');
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button[data-view]'); if(!b)return; showView(b.dataset.view);});
function showView(v){activeView=v; $$('.view').forEach(x=>x.classList.remove('active')); $('#view-'+v).classList.add('active'); $$('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render();}
function render(){renderInicio();renderClientes();renderAgenda();renderCalendar();renderHistorial();renderAjustes();}

/* ---------- Shared badges / empty states ---------- */
function statusBadge(s){
  const map={pending:['Pendiente','badge-pending'],done:['Realizada','badge-done'],cancelled:['Cancelada','badge-cancelled']};
  const [label,cls]=map[s]||[s,''];
  return `<span class="badge ${cls}">${esc(label)}</span>`;
}
function impBadge(imp){
  if(!imp) return '';
  const cls={'Baja':'imp-low','Media':'imp-mid','Alta':'imp-high','Muy alta':'imp-top'}[imp]||'';
  return `<span class="badge ${cls}">${esc(imp)}</span>`;
}
function empty(icon,title,sub){
  return `<div class="empty-state">${ICONS[icon]}<div class="empty-title">${esc(title)}</div>${sub?`<div class="empty-sub">${esc(sub)}</div>`:''}</div>`;
}

/* ---------- Inicio ---------- */
function renderInicio(){
  const pend=state.activities.filter(a=>a.status==='pending'); const done=state.activities.filter(a=>a.status==='done'); const hoy=pend.filter(a=>a.date===today());
  $('#view-inicio').innerHTML=`
 <div class="hero"><div class="hero-label">Resumen comercial</div><div class="hero-num">${pend.length}</div><div class="hero-note">Actividades pendientes</div></div>
 <div class="grid2"><div class="stat"><b>${state.clients.length}</b><span>Clientes</span></div><div class="stat"><b>${hoy.length}</b><span>Hoy</span></div><div class="stat"><b>${done.length}</b><span>Realizadas</span></div><div class="stat"><b>${state.companies.length}</b><span>Empresas</span></div></div>
 <div class="disclosure-group">
   ${disclosure('pendBlock','Pendientes',pend.length,()=>cards(pend.slice().sort(sortDate),true))}
   ${disclosure('hoyBlock','Visitas para hoy',hoy.length,()=>cards(hoy.slice().sort(sortDate),true))}
   ${disclosure('doneBlock','Últimas realizadas',Math.min(done.length,20),()=>cards(done.slice().sort(sortDateDesc).slice(0,20),true))}
 </div>`;
}
function disclosure(id,label,count,bodyFn){
  const wasOpen=!!$('#'+id) && !$('#'+id).classList.contains('hidden');
  return `<div class="disclosure"><button class="disclosure-head${wasOpen?' open':''}" onclick="toggleBlock('${id}')"><span>${esc(label)}</span><span class="disclosure-count">${count}</span>${ICONS.chevron}</button><div id="${id}" class="list ${wasOpen?'':'hidden'}">${bodyFn()}</div></div>`;
}
function toggleBlock(id){
  const el=$('#'+id); if(!el)return; const head=el.previousElementSibling;
  el.classList.toggle('hidden'); head.classList.toggle('open', !el.classList.contains('hidden'));
}
function cards(arr, detail){return arr.length?arr.map(a=>activityCard(a,detail)).join(''):empty('inbox','Sin registros','Todavía no hay actividad en este apartado.')}
function activityCard(a, detail=false){
  const c=client(a.clientId), co=company(a.companyId);
  return `<div class="card click" onclick="openActivityDetail('${a.id}')">
    <div class="row">
      <div style="min-width:0">
        <div class="card-eyebrow"><span class="dot" style="background:${co.color}"></span>${esc(co.name)} · ${esc(a.type==='first'?'Primera visita':'Seguimiento')}</div>
        <div class="card-title">${esc(clientName(a.clientId))}</div>
        <div class="card-sub">${fmtDate(a.date)}${a.time?' · '+esc(a.time):''}</div>
      </div>
      <div class="card-side">${statusBadge(a.status)}${ICONS.chevron}</div>
    </div>
    ${detail?`<div class="chips">${a.mode?`<span class="chip">${esc(a.mode)}</span>`:''}${a.todo?`<span class="chip">A tratar: ${esc(a.todo.slice(0,58))}</span>`:''}${a.doneText?`<span class="chip">Tratado: ${esc(a.doneText.slice(0,58))}</span>`:''}</div>`:''}
  </div>`;
}
function sortDate(a,b){return ((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||''))} function sortDateDesc(a,b){return -sortDate(a,b)}

/* ---------- Clientes ---------- */
function renderClientes(){
  const q=$('#clientSearch')?.value||''; const imp=$('#impFilter')?.value||'';
  let arr=state.clients.filter(c=>(selectedCompany==='all'||c.companyId===selectedCompany)&&matchesClient(c,q));
  if(imp)arr=arr.filter(c=>(c.importance||'')===imp);
  arr.sort((a,b)=>(company(a.companyId).name.localeCompare(company(b.companyId).name)||((a.order??999999)-(b.order??999999))||String(a.fiscalName).localeCompare(String(b.fiscalName))));
  const filtersOpen=!!$('#clientFilters') && !$('#clientFilters').classList.contains('hidden');
  $('#view-clientes').innerHTML=`<div class="section-title">Clientes</div>
  <div class="search-bar">${ICONS.search}<input id="clientSearch" placeholder="Buscar por nombre, CIF, contacto, teléfono..." value="${esc(q)}" oninput="renderClientes()"></div>
  <button class="filter-toggle" onclick="toggleBlock('clientFilters')">${ICONS.filter}<span>Filtros</span>${imp?`<span class="filter-active-dot"></span>`:''}</button>
  <div id="clientFilters" class="field ${filtersOpen?'':'hidden'}" style="margin-top:2px"><select id="impFilter" onchange="renderClientes()"><option value="">Todas las importancias</option>${['Baja','Media','Alta','Muy alta'].map(x=>`<option ${imp===x?'selected':''}>${x}</option>`).join('')}</select></div>
  <div class="list-count">${arr.length} ${arr.length===1?'cliente':'clientes'}</div>
  <div class="list">${arr.length?arr.map(clientCard).join(''):empty('inbox','No hay clientes','Prueba a cambiar la búsqueda o los filtros, o importa un CSV desde Ajustes.')}</div>`;
}
function clientCard(c){
  const co=company(c.companyId); const lc=lastContact(c.id);
  return `<div class="card click" onclick="openClient('${c.id}')">
    <div class="row">
      <div style="min-width:0">
        <div class="card-eyebrow"><span class="dot" style="background:${co.color}"></span>${esc(co.name)}${c.nif?' · '+esc(c.nif):''}</div>
        <div class="card-title">${esc(c.fiscalName||c.commercialName||'Cliente sin nombre')}</div>
        <div class="card-sub">${lc?'Último contacto '+fmtDate(lc):'Sin contacto todavía'}</div>
      </div>
      <div class="card-side">${impBadge(c.importance)}${ICONS.chevron}</div>
    </div>
  </div>`;
}

/* ---------- Agenda / Historial ---------- */
function renderAgenda(){const arr=state.activities.filter(a=>a.status==='pending').sort(sortDate); $('#view-agenda').innerHTML=`<div class="section-title">Agenda</div><div class="list-count">${arr.length} pendiente${arr.length===1?'':'s'}</div><div class="list">${cards(arr,true)}</div>`}
function renderHistorial(){const arr=state.activities.slice().sort(sortDateDesc); $('#view-historial').innerHTML=`<div class="section-title">Historial</div><div class="list-count">${arr.length} registro${arr.length===1?'':'s'}</div><div class="list">${cards(arr,true)}</div>`}

/* ---------- Calendario ---------- */
function renderCalendar(){
  const y=calDate.getFullYear(), m=calDate.getMonth(); const first=new Date(y,m,1); const start=new Date(first); start.setDate(first.getDate()-((first.getDay()+6)%7)); const cells=[];
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i); const iso=d.toISOString().slice(0,10); const acts=state.activities.filter(a=>a.date===iso); const colors=[...new Set(acts.map(a=>company(a.companyId).color))]; cells.push(`<div class="day ${d.getMonth()!==m?'out':''} ${iso===today()?'today':''}" onclick="openDay('${iso}')"><div class="day-num">${d.getDate()}</div><div class="points">${colors.map(c=>`<span class="point" style="background:${c}"></span>`).join('')}</div></div>`)}
  $('#view-calendario').innerHTML=`<div class="calendar-head"><button class="icon-btn" onclick="calDate.setMonth(calDate.getMonth()-1);renderCalendar()">${ICONS.chevronLeft}</button><div class="calendar-title">${calDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div><button class="icon-btn" onclick="calDate.setMonth(calDate.getMonth()+1);renderCalendar()">${ICONS.chevron}</button></div><div class="cal"><div class="cal-week">${['L','M','X','J','V','S','D'].map(x=>`<div>${x}</div>`).join('')}</div><div class="cal-grid">${cells.join('')}</div></div>`;
}

/* ---------- Ajustes ---------- */
function renderAjustes(){
  const opts=state.companies.map(c=>`<option value="${c.id}" ${selectedCompany===c.id?'selected':''}>${esc(c.name)}</option>`).join('');

/* ---------- Importación / exportación CSV & JSON ---------- */
function parseCSV(text){text=text.replace(/^\uFEFF/,''); const sample=text.slice(0,2000); const sep=(sample.match(/;/g)||[]).length>(sample.match(/,/g)||[]).length?';':','; const rows=[]; let row=[],cur='',q=false; for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1]; if(ch==='"'){if(q&&n==='"'){cur+='"';i++}else q=!q} else if(ch===sep&&!q){row.push(cur);cur=''} else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++; row.push(cur); if(row.some(x=>x.trim()))rows.push(row); row=[]; cur=''} else cur+=ch} row.push(cur); if(row.some(x=>x.trim()))rows.push(row); return rows;}
function mapHeader(h){
  const n=norm(h).replace(/[^a-z0-9]/g,'');
  const exact={codigo:'code',cod:'code',nombrefiscal:'fiscalName',nombre:'fiscalName',razonsocial:'fiscalName',nombrecomercial:'commercialName',telefono:'phone',telefonos:'phone',tlf:'phone',tel:'phone',fax:'fax',movil:'mobile',email:'email',email1:'email',correoelectronico:'email',personadecontacto:'contact',contacto:'contact',nif:'nif',cif:'nif',dni:'nif',nifcif:'nif',agente:'agent',tipodecliente:'type',tipo:'type',direccion:'address',domicilio:'address',ubicacion:'address',poblacion:'city',localidad:'city',ciudad:'city',provincia:'province',cp:'zip',codpostal:'zip',codigopostal:'zip'};
  if(exact[n]!==undefined) return exact[n];
  // Fallback: keyword matching so small header variations (real-world exports rarely match exactly) still map correctly.
  if(n==='') return '';
  if(/postal/.test(n)) return 'zip';
  if(/comercial/.test(n) && /nombre/.test(n)) return 'commercialName';
  if(/fiscal/.test(n) || /razonsocial/.test(n)) return 'fiscalName';
  if(/^nombre/.test(n)) return 'fiscalName';
  if(/movil|celular/.test(n)) return 'mobile';
  if(/^tel|^tlf|telefono/.test(n)) return 'phone';
  if(/^fax/.test(n)) return 'fax';
  if(/mail/.test(n)) return 'email';
  if(/contacto/.test(n)) return 'contact';
  if(/^nif|^cif|^dni/.test(n)) return 'nif';
  if(/agente/.test(n)) return 'agent';
  if(/^tipo/.test(n)) return 'type';
  if(/direccion|domicilio|ubicacion/.test(n)) return 'address';
  if(/poblacion|localidad|ciudad/.test(n)) return 'city';
  if(/provincia/.test(n)) return 'province';
  if(/^codigo$|^cod$/.test(n)) return 'code';
  return '';
}
function clientKey(obj){return norm(obj.code)||norm(obj.nif)||norm(obj.fiscalName)}
function checkImportCompanySelected(){
  const sel=$('#importCompany');
  if(!sel.value){
    sel.classList.add('field-error');
    sel.focus();
    toast('Selecciona primero la empresa destino.');
    return false; // cancels the native file picker so nothing silently fails
  }
  sel.classList.remove('field-error');
  return true;
}
function importCSV(file){const co=$('#importCompany').value; if(!co)return toast('Selecciona la empresa destino antes de importar.'); if(!file)return; const r=new FileReader(); r.onload=()=>processCSV(String(r.result),co); r.onerror=()=>{$('#importResult').innerHTML=`<div class="import-summary danger-text">No se ha podido leer el archivo. Comprueba que sea un CSV válido.</div>`}; r.readAsText(file,'utf-8');}
function processCSV(text,companyId){try{
  const rows=parseCSV(text);
  if(rows.length<2)throw new Error('El archivo está vacío o no contiene filas de datos.');
  const headers=rows[0].map(mapHeader);
  if(!headers.includes('fiscalName')&&!headers.includes('commercialName'))throw new Error('No se ha reconocido ninguna columna de nombre de cliente. Revisa las cabeceras del CSV (Nombre fiscal / Nombre comercial).');
  let added=0,skipped=0,conflicts=[];
  rows.slice(1).forEach((row,i)=>{
    let o={id:uid(),companyId,order:i+1,importance:'',createdAt:new Date().toISOString()};
    row.forEach((v,idx)=>{const k=headers[idx]; if(k&&!o[k])o[k]=String(v||'').trim()});
    if(!o.address){o.address=[o.direccion,o.zip,o.city,o.province].filter(Boolean).join(' ')}
    if(!o.fiscalName&&!o.commercialName)return;
    const key=clientKey(o);
    if(!key)return;
    let existing=state.clients.find(c=>clientKey(c)===key);
    if(existing){
      if(existing.companyId===companyId){
        // Same company, same client: the data already in the program always wins. Only keep row order in sync.
        existing.order=i+1; skipped++;
      }else{
        conflicts.push({incoming:o,existingId:existing.id});
      }
    }else{
      state.clients.push(o); added++;
    }
  });
  save(); render();
  let msg=`Importación finalizada\nAñadidos: ${added}\nYa existentes (sin modificar): ${skipped}\nSolapes con otra empresa: ${conflicts.length}`;
  $('#importResult').innerHTML=`<div class="import-summary">${esc(msg)}</div>`;
  if(conflicts.length)showConflicts(conflicts,companyId);
  else toast('Importación completada.');
}catch(e){$('#importResult').innerHTML=`<div class="import-summary danger-text">${esc(e.message||'No se ha podido importar el CSV. Revisa el formato del archivo.')}</div>`}}
function showConflicts(conflicts,targetCompany){
  const rowsHtml=conflicts.map((x,i)=>{
    const ex=client(x.existingId);
    return `<div class="card" data-conf="${i}">
      <div class="card-title">${esc(x.incoming.fiscalName||ex.fiscalName||ex.commercialName||'Cliente')}</div>
      <div class="card-sub">Ya existe en: ${esc(company(ex.companyId).name)}${ex.nif?' · '+esc(ex.nif):''}<br>En el CSV de: ${esc(company(targetCompany).name)}</div>
      <div class="conflict-choice" id="confChoice_${i}">
        <button type="button" class="conflict-opt active" data-val="duplicate" onclick="setConflictChoice(${i},'duplicate')">Duplicar cliente</button>
        <button type="button" class="conflict-opt" data-val="move" onclick="setConflictChoice(${i},'move')">Añadir a esta empresa</button>
      </div>
    </div>`;
  }).join('');
  openSheet('Clientes solapados',`${conflicts.length} cliente(s) ya existen en otra empresa`,`
    <div class="small">Estos clientes del CSV coinciden con clientes que ya tienes en otra empresa. Para cada uno, elige si quieres <b>duplicarlo</b> (se crea un cliente nuevo para ${esc(company(targetCompany).name)}, sin tocar el original) o <b>añadirlo a esta empresa</b> (el cliente pasa a pertenecer también a ${esc(company(targetCompany).name)}; los datos que ya tienes guardados nunca se sobrescriben, solo se completan los campos vacíos).</div>
    <div class="actions" style="margin-top:10px">
      <button class="btn" onclick="setAllConflicts('duplicate')">Duplicar todos</button>
      <button class="btn" onclick="setAllConflicts('move')">Añadir todos aquí</button>
    </div>
    <div class="list" id="conflictsList" style="margin-top:12px">${rowsHtml}</div>
    <button class="btn full primary" onclick='applyConflicts(${JSON.stringify(conflicts).replace(/'/g,"&#39;")})'>${ICONS.check}<span>Aplicar decisiones</span></button>`);
}
function setConflictChoice(i,val){
  const wrap=$('#confChoice_'+i); if(!wrap)return; wrap.dataset.choice=val;
  wrap.querySelectorAll('.conflict-opt').forEach(b=>b.classList.toggle('active',b.dataset.val===val));
}
function setAllConflicts(val){$$('.conflict-choice').forEach(wrap=>{wrap.dataset.choice=val; wrap.querySelectorAll('.conflict-opt').forEach(b=>b.classList.toggle('active',b.dataset.val===val));});}
const FILLABLE_FIELDS=['fiscalName','commercialName','phone','fax','mobile','email','contact','nif','agent','type','address','city','province','zip'];
function applyConflicts(conflicts){
  conflicts.forEach((x,i)=>{
    const wrap=$('#confChoice_'+i); const decision=wrap?.dataset.choice||'duplicate';
    if(decision==='duplicate'){
      // New, independent client for the target company. The original client is left completely untouched.
      state.clients.push(Object.assign({},x.incoming,{id:uid(),createdAt:new Date().toISOString()}));
    }else{
      // Add to the new company: the client already in the program always wins. We only fill in fields it doesn't have yet.
      const ex=client(x.existingId);
      if(ex){
        ex.companyId=x.incoming.companyId;
        ex.order=x.incoming.order;
        FILLABLE_FIELDS.forEach(f=>{ if(!ex[f]&&x.incoming[f]) ex[f]=x.incoming[f]; });
      }
    }
  });
  save(); closeSheet(); render(); toast('Solapes resueltos.');
}
function exportJSON(){download('crm_mds_backup_'+today()+'.json',JSON.stringify(state,null,2),'application/json'); toast('Copia descargada.');}
function importJSON(file){if(!file)return; const r=new FileReader(); r.onload=()=>{try{const d=JSON.parse(r.result); if(!d.companies||!d.clients||!d.activities)throw new Error('JSON no válido'); state=d; save(); render(); toast('Copia importada correctamente.')}catch(e){toast('Error importando JSON: '+e.message)}}; r.readAsText(file)}
function exportClientsCSV(){const rows=[['Empresa','Código','Nombre fiscal','Nombre comercial','NIF/CIF','Teléfono','Móvil','Email','Contacto','Dirección','Agente','Tipo','Importancia','Último contacto']]; state.clients.forEach(c=>{if(selectedCompany!=='all'&&c.companyId!==selectedCompany)return; rows.push([company(c.companyId).name,c.code,c.fiscalName,c.commercialName,c.nif,c.phone,c.mobile,c.email,c.contact,c.address,c.agent,c.type,c.importance,lastContact(c.id)])}); download('clientes_crm_mds_'+today()+'.csv',rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n'),'text/csv;charset=utf-8'); toast('CSV de clientes descargado.');}
function download(name,content,type){const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}


async function initApp(){
  const form=$('#authForm');
  form.addEventListener('submit',signInUser);
  const cfg=window.CRM_MDS_CONFIG||{};
  const configMissing=!cfg.supabaseUrl||!cfg.supabaseAnonKey||cfg.supabaseUrl.includes('TU-PROYECTO')||cfg.supabaseAnonKey.includes('TU_CLAVE');
  if(configMissing){
    $('#authConfigHelp').innerHTML='<b>Aplicación sin configurar.</b><br>Abre <b>config.js</b> y sustituye TU-PROYECTO y TU_CLAVE_PUBLICA_ANON por los datos reales de Supabase.';
    $('#authError').textContent='No se puede iniciar sesión hasta configurar la conexión con Supabase.';
    return;
  }
  if(!window.supabase?.createClient){
    $('#authError').textContent='No se ha podido cargar la librería de Supabase. Comprueba la conexión a Internet y recarga la página.';
    return;
  }
  try{
    supabaseClient=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    const {data:{session},error}=await supabaseClient.auth.getSession();
    if(error)throw error;
    if(session?.user)await enterApp(session.user);
    supabaseClient.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_OUT'){currentUser=null;cloudReady=false;$('#authScreen').classList.remove('hidden');}
    });
  }catch(error){
    console.error(error);
    $('#authError').textContent='No se ha podido conectar con Supabase. Revisa la URL y la clave pública de config.js.';
  }
}
async function signInUser(e){
  e.preventDefault();
  $('#authError').textContent='';
  if(!supabaseClient){
    $('#authError').textContent='La aplicación no está conectada con Supabase. Revisa config.js.';
    return;
  }
  const email=$('#authEmail').value.trim(),password=$('#authPassword').value;
  const button=$('#authForm button');
  button.disabled=true; button.querySelector('span').textContent='Entrando…';
  try{
    const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});
    if(error)throw error;
    if(!data?.user)throw new Error('Supabase no devolvió un usuario válido.');
    await enterApp(data.user);
  }catch(error){
    console.error(error);
    $('#authError').textContent=error?.message||'No se ha podido iniciar sesión. Revisa el correo y la contraseña.';
  }finally{
    button.disabled=false; button.querySelector('span').textContent='Entrar';
  }
}
async function enterApp(user){
  currentUser=user; setSyncStatus('Cargando');
  const {data,error}=await supabaseClient.from('crm_states').select('data').eq('user_id',user.id).maybeSingle();
  if(error){$('#authError').textContent='No se han podido cargar los datos de la nube.';console.error(error);return;}
  if(data?.data&&data.data.companies&&data.data.clients&&data.data.activities){state=data.data;localStorage.setItem(LS,JSON.stringify(state));}
  else {state=loadLocal(); cloudReady=true; await saveCloudState();}
  cloudReady=true; $('#authScreen').classList.add('hidden'); render(); setSyncStatus('Guardado');
}
async function signOutUser(){if(!supabaseClient)return;await saveCloudState();await supabaseClient.auth.signOut();location.reload();}

let deferredInstallPrompt=null;
const isStandalone=()=>window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
function updateOnlineState(){
  const pill=$('#offlinePill');
  if(pill)pill.classList.toggle('show',!navigator.onLine);
}
function updatePwaSettings(){
  const text=$('#pwaSettingsText'),button=$('#pwaSettingsButton');
  if(!text||!button)return;
  if(isStandalone()){
    text.textContent='CRM MDS ya está instalada en este dispositivo.';
    button.classList.add('hidden');
  }else if(isIOS()){
    text.textContent='En Safari, pulsa Compartir y después “Añadir a pantalla de inicio”.';
    button.querySelector('span').textContent='Ver instrucciones';
    button.classList.remove('hidden');
  }else{
    text.textContent='Instala CRM MDS para abrirla a pantalla completa desde el icono del móvil.';
    button.querySelector('span').textContent='Instalar aplicación';
    button.classList.remove('hidden');
  }
}
function showInstallBanner(){
  if(isStandalone()||localStorage.getItem('crm_mds_install_dismissed')==='1')return;
  const banner=$('#installBanner'),copy=$('#installCopy'),button=$('#installNow');
  if(!banner)return;
  if(isIOS()){
    copy.textContent='En Safari: pulsa Compartir y “Añadir a pantalla de inicio”.';
    button.textContent='Cómo hacerlo';
  }else if(!deferredInstallPrompt){
    return;
  }
  banner.classList.add('show');
}
async function requestAppInstall(){
  if(isStandalone()){toast('La aplicación ya está instalada.');return;}
  if(isIOS()){
    await showNotice('Instalar en iPhone o iPad','Abre esta web en Safari, pulsa el botón Compartir y elige “Añadir a pantalla de inicio”.');
    return;
  }
  if(!deferredInstallPrompt){
    toast('Abre el menú del navegador y selecciona “Instalar aplicación” o “Añadir a pantalla de inicio”.');
    return;
  }
  deferredInstallPrompt.prompt();
  const result=await deferredInstallPrompt.userChoice;
  if(result.outcome==='accepted')toast('Aplicación instalada.');
  deferredInstallPrompt=null;
  $('#installBanner')?.classList.remove('show');
  updatePwaSettings();
}
window.addEventListener('beforeinstallprompt',event=>{
  event.preventDefault();
  deferredInstallPrompt=event;
  setTimeout(showInstallBanner,1200);
  updatePwaSettings();
});
window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  $('#installBanner')?.classList.remove('show');
  localStorage.removeItem('crm_mds_install_dismissed');
  updatePwaSettings();
  toast('CRM MDS instalada correctamente.');
});
window.addEventListener('online',updateOnlineState);
window.addEventListener('offline',updateOnlineState);
$('#installNow')?.addEventListener('click',requestAppInstall);
$('#installClose')?.addEventListener('click',()=>{
  $('#installBanner')?.classList.remove('show');
  localStorage.setItem('crm_mds_install_dismissed','1');
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.error));
}
updateOnlineState();
setTimeout(()=>{if(isIOS())showInstallBanner();updatePwaSettings();},1400);

initApp();
</script>
